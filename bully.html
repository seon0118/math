<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路霸凌沉浸式體驗 - 進階關卡版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 更新 Babel 至 v7 以支援更現代的 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-900 m-0 p-0 w-screen h-screen flex justify-center items-center overflow-hidden">
    <div id="root" class="w-full h-full flex justify-center items-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- SVG 圖示元件 (使用 <g> 替換 <>) ---
        const Icon = ({ paths, className = "", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`lucide ${className}`} {...props}>{paths}</svg>
        );

        const Bell = (props) => <Icon {...props} paths={<g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></g>} />;
        const Home = (props) => <Icon {...props} paths={<g><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></g>} />;
        const MessageCircle = (props) => <Icon {...props} paths={<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/>} />;
        const User = (props) => <Icon {...props} paths={<g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></g>} />;
        const Heart = (props) => <Icon {...props} paths={<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>} />;
        const Share2 = (props) => <Icon {...props} paths={<g><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></g>} />;
        const MoreHorizontal = (props) => <Icon {...props} paths={<g><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></g>} />;
        const ArrowLeft = (props) => <Icon {...props} paths={<g><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></g>} />;
        const Power = (props) => <Icon {...props} paths={<g><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></g>} />;
        const AlertTriangle = (props) => <Icon {...props} paths={<g><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></g>} />;
        const ShieldCheck = (props) => <Icon {...props} paths={<g><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.89 0 4.7 1 6.8 2a1 1 0 0 1 1 1Z"/><path d="m9 12 2 2 4-4"/></g>} />;
        const Skull = (props) => <Icon {...props} paths={<g><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></g>} />;
        const Flame = (props) => <Icon {...props} paths={<g><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></g>} />;
        const Send = (props) => <Icon {...props} paths={<g><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></g>} />;

        // --- 模擬數據 ---
        // 第一關：貼文
        const MOCK_POST = {
            author: '你的帳號', handle: '@user_1234',
            avatar: 'https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e2e8f0',
            content: '今天的小組報告終於順利結束了！為了這個專案熬夜好幾天，大家都辛苦啦～ 期待週末的慶功宴！ ✨🍕',
            time: '10 分鐘前', likes: 12,
        };
        const FEED_PART_1 = [
            { id: 1, user: '匿名者_99', text: '笑死，你根本沒做事吧？都在雷別人。' },
            { id: 2, user: '看戲的', text: '聽說她把別人的功勞搶走欸，有夠心機。' },
            { id: 3, user: '正義使者', text: '長這樣還敢發文求關注？嘔嘔嘔🤢' },
        ];
        const FEED_PART_2_ESCALATED = [
            { id: 'u1', user: '你的帳號', text: '你們到底在說什麼？我明明就有做事！不要亂說話好嗎？', isUser: true },
            { id: 4, user: '路人甲', text: '急了急了，被說中開始跳腳囉？' },
            { id: 5, user: 'Hater123', text: '截圖了，態度這麼差，等等發到校版給大家看。' },
        ];

        // 第二關：私訊
        const DM_PART_1 = [
            { id: 1, text: '你怎麼不去死一死？' },
            { id: 2, text: '明天到學校你就知道。' },
            { id: 3, text: '大家都討厭你，你沒有朋友了。' },
        ];
        const DM_PART_2_ESCALATED = [
            { id: 4, text: '我把你以前的醜照都發到論壇上了' },
            { id: 5, text: '不敢回？心虛了嗎？' },
        ];
        const DM_BEGGING = [
            { id: 'u2', text: '對不起，如果我哪裡做錯了可以告訴我嗎？請你們不要這樣...', isUser: true },
            { id: 6, text: '笑死，現在知道怕了？' },
            { id: 7, text: '太遲了啦，截圖發到大群給大家笑' },
            { id: 8, text: '看你這可悲的樣子就覺得噁心🤢' }
        ];

        // 第三關：匿名論壇公審
        const FORUM_POST = {
            title: '【爆料】某系大一女的真面目',
            content: '不只分組報告躺分搶功勞，聽說她私底下還到處借錢不還。附上她以前國中的超胖醜照，笑死，現在是在裝什麼網美？',
            time: '剛剛', likes: 892, comments: 145
        };
        const FORUM_COMMENTS = [
            { id: 1, user: 'B1', text: '卡等上車，求更多卦' },
            { id: 2, user: 'B2', text: '這女的真的噁，難怪系上沒人想理她' },
            { id: 3, user: 'B3', text: '推，不能只有我看到。這種人就是要讓她社會性死亡。' },
            { id: 4, user: 'B4', text: '已肉搜到她個版，大家上啊！' },
        ];
        const FORUM_ESCALATED = [
            { id: 'u1', user: '你的帳號 (實名)', text: '這根本不是真的！照片也是假的！請你們立刻刪除，不然我要報警了！', isUser: true },
            { id: 5, user: 'B5', text: '哇本尊出現了！大家快來看啊！！！' },
            { id: 6, user: 'B6', text: '報警啊笑死，你以為警察會管這種小事？' },
            { id: 7, user: 'B7', text: '惱羞成怒囉～ 真可悲。' },
        ];

        // 第四關：溫馨求助
        const HELP_MESSAGES = [
            { id: 1, sender: 'friend', text: '小雅：你還好嗎？我看到那些論壇上的貼文了...' },
            { id: 2, sender: 'friend', text: '小雅：你千萬不要往心裡去，我們都知道你為了報告有多努力，那些人根本是在亂說話。' },
            { id: 3, sender: 'user', text: '我不知道該怎麼辦...他們連我國中的照片都拿出來嘲笑，我不敢去學校了...' },
            { id: 4, sender: 'friend', text: '小雅：不要怕！我現在去你家找你！我們一起把這些都截圖存證，明天去找系主任和輔導室。你不是一個人，我陪你！❤️' },
        ];

        const SILENT_THOUGHTS = [
            { id: 1, text: '只要不看就好了...' },
            { id: 2, text: '明天去學校...大家會怎麼看我？' },
            { id: 3, text: '是不是真的是我的錯？' },
            { id: 4, text: '好累...不想面對這一切...' }
        ];

        const FLOATING_WORDS = ['去死', '社會性死亡', '心機重', '肉搜她', '沒人愛你', '垃圾', '造作', '滾', '醜八怪', '噁心'];

        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // --- 主元件 ---
        function CyberbullyingSimulation() {
            const [scene, setScene] = useState('intro');
            const [comments, setComments] = useState([]);
            const [dms, setDms] = useState([]);
            const [forumComments, setForumComments] = useState([]);
            const [helpChat, setHelpChat] = useState([]);
            const [unreadDMs, setUnreadDMs] = useState(0);
            const [isShaking, setIsShaking] = useState(false);
            const [climaxWords, setClimaxWords] = useState([]);
            const [silentThoughts, setSilentThoughts] = useState([]);
            const [activeChoice, setActiveChoice] = useState(null);
            const [endingType, setEndingType] = useState('none');

            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [comments, dms, forumComments, helpChat]);

            // --- 劇情控制器 ---
            useEffect(() => {
                let isCancelled = false;

                const runScenario = async () => {
                    // 關卡 1：貼文
                    if (scene === 'feed') {
                        await delay(1000);
                        for (let c of FEED_PART_1) {
                            if (isCancelled) return;
                            setComments(prev => [...prev, c]);
                            await delay(1500);
                        }
                        setUnreadDMs(3);
                        await delay(1000);
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【第一階段】留言風向突變，充滿惡意。你要如何反應？",
                                options: [
                                    { label: "氣死了，直接留言跟他們吵！", type: "danger", action: () => { setActiveChoice(null); setScene('feed_escalated'); } },
                                    { label: "不理會留言，去看看右上角的私訊...", type: "neutral", action: () => { setActiveChoice(null); setScene('dm'); } }
                                ]
                            });
                        }
                    }
                    else if (scene === 'feed_escalated') {
                        for (let c of FEED_PART_2_ESCALATED) {
                            if (isCancelled) return;
                            setComments(prev => [...prev, c]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 200);
                            await delay(c.isUser ? 1000 : 1500);
                        }
                        await delay(1500);
                        if (!isCancelled) setScene('forum'); // 吵架後引發更大波瀾，進入論壇公審
                    }

                    // 關卡 2：私訊
                    else if (scene === 'dm') {
                        await delay(500);
                        setUnreadDMs(0);
                        for (let d of DM_PART_1) {
                            if (isCancelled) return;
                            setDms(prev => [...prev, d]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 200);
                            await delay(1500);
                        }
                        await delay(1000);
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【第二階段】連私領域都被惡意灌爆，對方甚至威脅你...",
                                options: [
                                    { label: "立刻封鎖他們並關閉手機！", type: "safe", action: () => { setActiveChoice(null); setEndingType('good_early'); setScene('outro'); } },
                                    { label: "向他們道歉，求他們放過我...", type: "neutral", action: () => { setActiveChoice(null); setScene('dm_begging'); } },
                                    { label: "我倒要看看他們還能說多難聽的話！", type: "danger", action: () => { setActiveChoice(null); setScene('dm_escalated'); } }
                                ]
                            });
                        }
                    }
                    else if (scene === 'dm_begging') {
                        for (let d of DM_BEGGING) {
                            if (isCancelled) return;
                            setDms(prev => [...prev, d]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 300);
                            await delay(1500);
                        }
                        await delay(2500);
                        if (!isCancelled) {
                            setEndingType('bad_begging');
                            setScene('outro'); // 妥協失敗，進入悲慘結局
                        }
                    }
                    else if (scene === 'dm_escalated') {
                        for (let d of DM_PART_2_ESCALATED) {
                            if (isCancelled) return;
                            setDms(prev => [...prev, d]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 300);
                            await delay(1200);
                        }
                        await delay(1500);
                        if (!isCancelled) setScene('forum'); // 繼續看引發焦慮，且對方把戰火延燒到論壇
                    }

                    // 關卡 3：匿名論壇 (Doxxing)
                    else if (scene === 'forum') {
                        await delay(1000);
                        for (let c of FORUM_COMMENTS) {
                            if (isCancelled) return;
                            setForumComments(prev => [...prev, c]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 150);
                            await delay(1200);
                        }
                        await delay(1000);
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【最終階段】他們在匿名論壇公開你的個資與假照片（肉搜），成千上萬的人正在看戲...",
                                options: [
                                    { label: "用真實身分回文，發誓澄清這一切！", type: "danger", action: () => { setActiveChoice(null); setScene('forum_escalated'); } },
                                    { label: "獨自承受，關掉手機假裝沒發生...", type: "neutral", action: () => { setActiveChoice(null); setScene('silent_suffering'); } },
                                    { label: "我受不了了，傳訊息向好朋友求救...", type: "safe", action: () => { setActiveChoice(null); setScene('chat_help'); } }
                                ]
                            });
                        }
                    }
                    else if (scene === 'forum_escalated') {
                        for (let c of FORUM_ESCALATED) {
                            if (isCancelled) return;
                            setForumComments(prev => [...prev, c]);
                            setIsShaking(true); setTimeout(() => setIsShaking(false), 300);
                            await delay(1500);
                        }
                        await delay(1500);
                        if (!isCancelled) {
                            setEndingType('bad');
                            setScene('climax'); // 澄清無效反被嘲笑，進入崩潰結局
                        }
                    }

                    // 關卡 4：求助 (Good Ending 2)
                    else if (scene === 'chat_help') {
                        await delay(1000);
                        for (let msg of HELP_MESSAGES) {
                            if (isCancelled) return;
                            setHelpChat(prev => [...prev, msg]);
                            await delay(msg.sender === 'user' ? 1000 : 2500);
                        }
                        await delay(3000);
                        if (!isCancelled) {
                            setEndingType('good_late');
                            setScene('outro');
                        }
                    }
                    else if (scene === 'silent_suffering') {
                        await delay(1000);
                        for (let thought of SILENT_THOUGHTS) {
                            if (isCancelled) return;
                            setSilentThoughts(prev => [...prev, thought]);
                            await delay(3000);
                        }
                        await delay(2000);
                        if (!isCancelled) {
                            setEndingType('bad_silent');
                            setScene('outro');
                        }
                    }
                };

                runScenario();
                return () => { isCancelled = true; };
            }, [scene]);

            // 處理高潮場景的文字浮動
            useEffect(() => {
                if (scene === 'climax') {
                    const interval = setInterval(() => {
                        setClimaxWords((prev) => [
                            ...prev,
                            {
                                id: Date.now(),
                                text: FLOATING_WORDS[Math.floor(Math.random() * FLOATING_WORDS.length)],
                                x: Math.random() * 80 + 10,
                                y: Math.random() * 80 + 10,
                                scale: Math.random() * 1.5 + 1,
                            },
                        ]);
                    }, 250);
                    return () => clearInterval(interval);
                }
            }, [scene]);

            const resetSimulation = () => {
                setScene('intro');
                setComments([]);
                setDms([]);
                setForumComments([]);
                setHelpChat([]);
                setUnreadDMs(0);
                setClimaxWords([]);
                setSilentThoughts([]);
                setActiveChoice(null);
                setEndingType('none');
            };

            const renderChoiceOverlay = () => {
                if (!activeChoice) return null;
                return (
                    <div className="absolute inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 animate-fade-in">
                        <div className="bg-white rounded-2xl p-6 shadow-2xl w-full max-w-sm flex flex-col items-center text-center">
                            <AlertTriangle className="w-12 h-12 text-yellow-500 mb-4" />
                            <h3 className="text-gray-900 font-bold text-lg mb-6 leading-relaxed">
                                {activeChoice.title}
                            </h3>
                            <div className="w-full space-y-3">
                                {activeChoice.options.map((opt, idx) => {
                                    let btnClass = "bg-gray-100 text-gray-800 hover:bg-gray-200"; // neutral
                                    if (opt.type === 'danger') btnClass = "bg-red-50 text-red-600 border border-red-200 hover:bg-red-100";
                                    if (opt.type === 'safe') btnClass = "bg-blue-600 text-white hover:bg-blue-700 shadow-md";
                                    if (opt.type === 'neutral') btnClass = "bg-gray-600 text-white hover:bg-gray-700 shadow-md"; // 強化中立按鈕視覺
                                    
                                    return (
                                        <button
                                            key={idx}
                                            onClick={opt.action}
                                            className={`w-full py-3 px-4 rounded-xl font-bold transition-all transform hover:scale-105 ${btnClass}`}
                                        >
                                            {opt.label}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderIntro = () => (
                <div className="h-full flex flex-col items-center justify-center p-8 bg-gray-900 text-white text-center">
                    <AlertTriangle className="w-16 h-16 text-red-500 mb-6 animate-pulse" />
                    <h1 className="text-3xl font-bold mb-4 tracking-wider">網路霸凌<br/>多重結局體驗</h1>
                    <div className="bg-gray-800 p-4 rounded-xl mb-8 text-left w-full shadow-inner">
                        <p className="text-gray-300 text-sm leading-relaxed">
                            這是一個包含 <strong className="text-red-400">三個階段</strong> 的沉浸式模擬：<br/><br/>
                            1️⃣ 貼文流言 ➡️ 2️⃣ 私訊攻擊 ➡️ 3️⃣ 匿名公審<br/><br/>
                            您的每個選擇都將影響事態的發展。您能成功跳脫惡意的漩渦嗎？
                        </p>
                    </div>
                    <button
                        onClick={() => setScene('feed')}
                        className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-red-900/50 flex justify-center items-center gap-2"
                    >
                        <Flame className="w-5 h-5" /> 我準備好了，開始體驗
                    </button>
                </div>
            );

            const renderFeed = () => (
                <div className="h-full bg-white flex flex-col relative">
                    <div className="flex justify-between items-center p-4 border-b bg-white/80 backdrop-blur-md sticky top-0 z-10">
                        <h2 className="text-xl font-bold text-gray-800 tracking-tighter">SocialEcho</h2>
                        <div className="flex gap-4 relative">
                            <div className="relative cursor-pointer" onClick={() => activeChoice ? null : setScene('dm')}>
                                <MessageCircle className="text-gray-600 w-6 h-6" />
                                {unreadDMs > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full animate-bounce">
                                        {unreadDMs}
                                    </span>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="p-4 border-b flex-1 overflow-y-auto bg-gray-50 pb-20">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-3">
                                <div className="flex items-center gap-3">
                                    <img src={MOCK_POST.avatar} alt="avatar" className="w-10 h-10 rounded-full border border-gray-200" />
                                    <div>
                                        <p className="font-bold text-sm text-gray-900">{MOCK_POST.author}</p>
                                        <p className="text-xs text-gray-500">{MOCK_POST.handle} • {MOCK_POST.time}</p>
                                    </div>
                                </div>
                                <MoreHorizontal className="text-gray-400 w-5 h-5" />
                            </div>
                            <p className="text-gray-800 text-sm leading-relaxed mb-4">{MOCK_POST.content}</p>
                            <div className="flex gap-6 text-gray-500 border-t pt-3">
                                <button className="flex items-center gap-1.5 text-xs"><Heart className="w-4 h-4" /> {MOCK_POST.likes}</button>
                                <button className="flex items-center gap-1.5 text-xs"><MessageCircle className="w-4 h-4" /> {comments.length}</button>
                                <button className="flex items-center gap-1.5 text-xs"><Share2 className="w-4 h-4" /></button>
                            </div>
                        </div>

                        <div className="mt-4 space-y-3">
                            {comments.map((comment) => (
                                <div key={comment.id} className={`p-3 rounded-xl border animate-fade-in flex gap-3 ${comment.isUser ? 'bg-blue-50 border-blue-100' : 'bg-white border-gray-100'}`}>
                                    <div className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${comment.isUser ? 'bg-blue-200' : 'bg-gray-200'}`}>
                                        <User className={`w-4 h-4 ${comment.isUser ? 'text-blue-600' : 'text-gray-400'}`} />
                                    </div>
                                    <div>
                                        <p className="text-xs font-bold text-gray-900 mb-1">{comment.user}</p>
                                        <p className="text-sm text-gray-700">{comment.text}</p>
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} />
                        </div>
                    </div>
                    {renderChoiceOverlay()}
                </div>
            );

            const renderDM = () => (
                <div className="h-full bg-gray-50 flex flex-col relative">
                    <div className="flex items-center gap-4 p-4 border-b bg-white shadow-sm">
                        <button onClick={() => activeChoice ? null : setScene('feed')} className="text-gray-600">
                            <ArrowLeft className="w-5 h-5" />
                        </button>
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 rounded-full bg-red-100 flex items-center justify-center">
                                <AlertTriangle className="w-4 h-4 text-red-500" />
                            </div>
                            <div>
                                <h2 className="text-sm font-bold text-gray-900">陌生訊息請求</h2>
                                <p className="text-xs text-gray-500">這些人不在你的好友名單中</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto space-y-4">
                        {dms.map((dm) => (
                            <div key={dm.id} className={`flex gap-2 animate-fade-in-left ${dm.isUser ? 'flex-row-reverse animate-fade-in' : ''}`}>
                                {!dm.isUser && <div className="w-8 h-8 rounded-full bg-gray-300 flex-shrink-0" />}
                                <div className={`border p-3 rounded-2xl shadow-sm max-w-[80%] ${dm.isUser ? 'bg-blue-500 text-white border-blue-600 rounded-tr-none' : 'bg-white border-gray-200 rounded-tl-none'}`}>
                                    <p className={`text-sm ${dm.isUser ? 'text-white' : 'text-gray-800'}`}>{dm.text}</p>
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    {renderChoiceOverlay()}
                </div>
            );

            const renderForum = () => (
                <div className="h-full bg-[#1A1A1A] flex flex-col relative text-gray-300">
                    <div className="flex items-center justify-between p-4 bg-[#2A2A2A] shadow-md z-10">
                        <h2 className="text-lg font-bold text-blue-400 tracking-wider">🔥 黑特八卦版</h2>
                        <span className="text-xs bg-red-600 text-white px-2 py-1 rounded">HOT</span>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto pb-20">
                        <div className="bg-[#2A2A2A] p-4 rounded-xl shadow-lg border border-red-900/30 mb-4">
                            <h3 className="text-lg font-bold text-white mb-2">{FORUM_POST.title}</h3>
                            <p className="text-sm text-gray-400 mb-2">{FORUM_POST.time}</p>
                            <p className="text-sm text-gray-200 mb-4 leading-relaxed">{FORUM_POST.content}</p>
                            <div className="w-full h-32 bg-gray-700 flex items-center justify-center rounded-lg mb-4 opacity-50 relative overflow-hidden">
                                <span className="text-gray-400 z-10">[圖片已被系統模糊處理]</span>
                                <div className="absolute inset-0 bg-red-500 mix-blend-overlay opacity-20"></div>
                            </div>
                            <div className="flex gap-4 text-sm text-gray-400 border-t border-gray-700 pt-3">
                                <span className="text-red-400 font-bold">🔥 {FORUM_POST.likes} 暴怒</span>
                                <span>💬 {forumComments.length} 留言</span>
                            </div>
                        </div>

                        <div className="space-y-3">
                            {forumComments.map((comment) => (
                                <div key={comment.id} className={`p-3 rounded-lg flex gap-3 ${comment.isUser ? 'bg-blue-900/30 border border-blue-500/30' : 'bg-[#2A2A2A]'}`}>
                                    <div className="w-8 h-8 rounded bg-gray-600 flex-shrink-0 flex items-center justify-center text-xs text-white font-bold">
                                        {comment.user.substring(0,2)}
                                    </div>
                                    <div className="flex-1">
                                        <p className={`text-xs font-bold mb-1 ${comment.isUser ? 'text-blue-400' : 'text-gray-400'}`}>{comment.user}</p>
                                        <p className="text-sm text-gray-200">{comment.text}</p>
                                    </div>
                                </div>
                            ))}
                            <div ref={messagesEndRef} />
                        </div>
                    </div>
                    {renderChoiceOverlay()}
                </div>
            );

            const renderHelpChat = () => (
                <div className="h-full bg-[#E5DDD5] flex flex-col relative">
                    <div className="flex items-center gap-3 p-4 bg-[#075E54] text-white shadow-md z-10">
                        <ArrowLeft className="w-5 h-5" />
                        <div className="w-8 h-8 rounded-full bg-white text-[#075E54] flex items-center justify-center font-bold">雅</div>
                        <h2 className="text-lg font-bold">好閨蜜 小雅</h2>
                    </div>

                    <div className="flex-1 p-4 overflow-y-auto space-y-4 pb-20" style={{ backgroundImage: 'url("https://www.transparenttextures.com/patterns/cubes.png")' }}>
                        {helpChat.map((msg) => (
                            <div key={msg.id} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}>
                                <div className={`p-3 rounded-2xl max-w-[80%] shadow-sm ${msg.sender === 'user' ? 'bg-[#DCF8C6] rounded-tr-none' : 'bg-white rounded-tl-none'}`}>
                                    <p className="text-sm text-gray-800">{msg.text}</p>
                                </div>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                    <div className="absolute bottom-0 w-full p-2 bg-[#F0F0F0] flex items-center gap-2">
                        <div className="flex-1 bg-white rounded-full h-10 px-4 flex items-center text-gray-400 text-sm">輸入訊息...</div>
                        <div className="w-10 h-10 bg-[#00897B] rounded-full flex items-center justify-center text-white"><Send className="w-5 h-5" /></div>
                    </div>
                    {renderChoiceOverlay()}
                </div>
            );

            const renderClimax = () => (
                <div className="h-full bg-black flex flex-col items-center justify-center relative overflow-hidden">
                    <div className="absolute inset-0 opacity-20 mix-blend-screen pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E")' }}></div>

                    {climaxWords.map((word) => (
                        <span
                            key={word.id}
                            className="absolute text-red-600 font-bold whitespace-nowrap pointer-events-none transition-opacity duration-1000"
                            style={{ left: `${word.x}%`, top: `${word.y}%`, transform: `scale(${word.scale})`, opacity: Math.random() > 0.5 ? 0.9 : 0.4, textShadow: '0 0 10px rgba(220, 38, 38, 0.8)' }}
                        >
                            {word.text}
                        </span>
                    ))}

                    <div className="z-10 bg-black/80 p-8 rounded-2xl backdrop-blur-sm border border-red-900/50 flex flex-col items-center animate-pulse">
                        <h2 className="text-white text-2xl font-bold mb-4">感覺快要窒息了嗎？</h2>
                        <p className="text-gray-400 text-sm mb-8 text-center max-w-[250px]">
                            當惡意跨越平台，像海嘯般襲來，你已經失去了控制權。<br/><br/>實名澄清只會引來更多嗜血的嘲笑。
                        </p>
                        <button onClick={() => setScene('outro')} className="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold transition-all transform hover:scale-105">
                            <Power className="w-5 h-5" /> 強制關機
                        </button>
                    </div>
                </div>
            );

            const renderSilentSuffering = () => (
                <div className="h-full bg-black flex flex-col items-center justify-center relative p-8">
                    <div className="space-y-12 w-full max-w-[250px]">
                        {silentThoughts.map((thought, idx) => (
                            <p 
                                key={thought.id} 
                                className="text-gray-400 text-center animate-fade-in text-lg font-medium"
                                style={{ animationDuration: '2s' }}
                            >
                                {thought.text}
                            </p>
                        ))}
                    </div>
                </div>
            );

            const renderOutro = () => {
                let title, icon, colorClass, desc, takeAway;

                if (endingType === 'good_early') {
                    title = "結局：及時止損";
                    icon = <ShieldCheck className="w-8 h-8" />;
                    colorClass = "bg-blue-100 text-blue-600";
                    desc = "太好了！在惡意剛開始蔓延時，你選擇了「不看、不理、封鎖」。這需要很大的決心，但也成功將傷害降到了最低。";
                    takeAway = "【不隨之起舞】是面對初期網路攻擊最好的防禦。惡意留言者往往渴望看到你的崩潰與回應，切斷連結就是最好的反擊。";
                } else if (endingType === 'bad_begging') {
                    title = "結局：放棄尊嚴的代價";
                    icon = <Skull className="w-8 h-8" />;
                    colorClass = "bg-purple-100 text-purple-600";
                    desc = "你選擇了妥協與求饒，希望能平息風波。但對於網路霸凌者而言，示弱不僅無法喚起同情，反而成為了他們新的笑柄與攻擊素材。";
                    takeAway = "面對充滿惡意的霸凌者，【委曲求全往往只會換來更多傷害】。不要試圖向不講理的人證明自己的價值，你的尊嚴不該被這樣踐踏。";
                } else if (endingType === 'good_late') {
                    title = "結局：溫暖的光";
                    icon = <Heart className="w-8 h-8" />;
                    colorClass = "bg-green-100 text-green-600";
                    desc = "在面對匿名論壇鋪天蓋地的造謠與肉搜時，你沒有選擇獨自承受或硬碰硬，而是勇敢地向信任的朋友求救。";
                    takeAway = "【尋求協助】是終結霸凌的關鍵。當事態升級到肉搜或恐嚇時，請立刻截圖存證，並告訴家人、老師或報警。你永遠不是一個人。";
                } else if (endingType === 'bad_silent') {
                    title = "結局：無聲的窒息";
                    icon = <User className="w-8 h-8" />;
                    colorClass = "bg-gray-200 text-gray-800";
                    desc = "你選擇關上手機，試圖將一切隔絕在外。但網路上的惡意並沒有停止，反而像慢性毒藥一樣，在現實生活中慢慢侵蝕你的心理防線，讓你陷入了更深的孤立與抑鬱。";
                    takeAway = "【逃避無法解決所有的網路暴力】。當攻擊已經涉及公眾論壇或威脅現實生活時，獨自承受會壓垮你。勇敢求助，讓外界的力量介入，才是打破黑暗的唯一方式。";
                } else {
                    title = "結局：深淵吞噬";
                    icon = <Skull className="w-8 h-8" />;
                    colorClass = "bg-red-100 text-red-600";
                    desc = "你試圖獨自對抗這些惡意，甚至在匿名論壇實名澄清，卻不小心讓自己陷入了更深的泥沼。在匿名的保護傘下，群眾往往是不理性的。";
                    takeAway = "切記：【不要與匿名者辯論】。在網路公審中，自證清白往往會被曲解為「惱羞成怒」。立刻遠離網路環境，收集證據才是正確的做法。";
                }

                return (
                    <div className="h-full bg-gray-50 flex flex-col p-6 overflow-y-auto">
                        <div className="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 flex-1 flex flex-col">
                            <div className="text-center mb-6">
                                <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 ${colorClass}`}>{icon}</div>
                                <h2 className="text-2xl font-bold text-gray-900 mb-2">{title}</h2>
                            </div>
                            <p className="text-gray-600 mb-6 leading-relaxed text-sm font-medium">{desc}</p>
                            
                            <div className="space-y-4 flex-1">
                                <h3 className="font-bold text-gray-900 border-b pb-2">本局啟示：</h3>
                                <div className="bg-gray-50 p-4 rounded-xl border border-gray-100">
                                    <p className="text-gray-700 text-sm leading-relaxed">{takeAway}</p>
                                </div>
                                
                                <h3 className="font-bold text-gray-900 border-b pb-2 mt-4">防護三步驟：</h3>
                                <ul className="text-sm text-gray-600 space-y-2">
                                    <li>1️⃣ <strong>停看聽：</strong> 停止滑手機，遠離情緒暴風圈。</li>
                                    <li>2️⃣ <strong>存證據：</strong> 截圖保留帳號、時間與恐嚇內容。</li>
                                    <li>3️⃣ <strong>求支援：</strong> 向朋友、師長、家長或撥打 1953 反霸凌專線求助。</li>
                                </ul>
                            </div>

                            <button onClick={resetSimulation} className="mt-8 bg-gray-900 text-white font-bold py-4 rounded-xl shadow-md hover:bg-black transition-colors">
                                重新體驗不同選擇
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen w-full bg-neutral-900 flex items-center justify-center p-4 font-sans">
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes custom-shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); } 20%, 40%, 60%, 80% { transform: translateX(3px); } }
                        .animate-custom-shake { animation: custom-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
                        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
                        @keyframes fade-in-left { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
                        .animate-fade-in-left { animation: fade-in-left 0.3s ease-out forwards; }
                    `}} />

                    <div className={`w-full max-w-[375px] h-[812px] bg-black rounded-[3rem] p-2 shadow-2xl relative overflow-hidden transition-transform duration-100 ${isShaking ? 'animate-custom-shake' : ''}`} style={{ boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 2px #333' }}>
                        <div className="absolute top-0 inset-x-0 h-7 bg-black rounded-b-3xl w-40 mx-auto z-50"></div>
                        <div className="w-full h-full bg-white rounded-[2.5rem] overflow-hidden relative">
                            {scene === 'intro' && renderIntro()}
                            {(scene === 'feed' || scene === 'feed_escalated') && renderFeed()}
                            {(scene === 'dm' || scene === 'dm_escalated' || scene === 'dm_begging') && renderDM()}
                            {(scene === 'forum' || scene === 'forum_escalated') && renderForum()}
                            {scene === 'chat_help' && renderHelpChat()}
                            {scene === 'silent_suffering' && renderSilentSuffering()}
                            {scene === 'climax' && renderClimax()}
                            {scene === 'outro' && renderOutro()}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CyberbullyingSimulation />);
    </script>
</body>
</html>
