<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>一元一次不等式：學習與對戰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    
    /* 動畫區 */
    @keyframes freezePulse {
      0% { background-color: rgba(14, 165, 233, 0.8); }
      50% { background-color: rgba(56, 189, 248, 0.9); }
      100% { background-color: rgba(14, 165, 233, 0.8); }
    }
    .frozen-overlay {
      animation: freezePulse 2s infinite;
      backdrop-filter: blur(8px);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popOut {
      0% { opacity: 0; transform: scale(0.5) translateY(20px); }
      50% { opacity: 1; transform: scale(1.2) translateY(-10px); }
      100% { opacity: 0; transform: scale(1) translateY(-40px); }
    }
    .animate-pop-out {
      animation: popOut 0.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes pulse-fast {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .combo-text {
      animation: pulse-fast 0.6s infinite;
    }
    
    /* 燃燒特效 (10連擊以上) */
    @keyframes fireGlow {
      0%, 100% { box-shadow: 0 0 15px 5px rgba(255, 69, 0, 0.7), inset 0 0 10px rgba(255, 140, 0, 0.5); border-color: rgba(255, 69, 0, 0.8); }
      50% { box-shadow: 0 0 30px 15px rgba(255, 140, 0, 0.9), inset 0 0 20px rgba(255, 215, 0, 0.7); border-color: rgba(255, 215, 0, 1); }
    }
    .on-fire-container {
      animation: fireGlow 1.5s infinite ease-in-out;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,69,0,0.25)) !important;
    }
    .on-fire-text {
      color: #fff3e0;
      text-shadow: 0 0 15px rgba(255,69,0,0.8), 0 0 30px rgba(255,140,0,0.8);
    }

    /* 結算畫面與彩帶動畫 */
    @keyframes panelEntrance {
      0% { opacity: 0; transform: scale(0.8) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .animate-panel-in {
      animation: panelEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
    }
    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 100;
    }
    @keyframes tada {
      0% { transform: scale3d(1, 1, 1); }
      10%, 20% { transform: scale3d(0.9, 0.9, 0.9) rotate3d(0, 0, 1, -3deg); }
      30%, 50%, 70%, 90% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, 3deg); }
      40%, 60%, 80% { transform: scale3d(1.1, 1.1, 1.1) rotate3d(0, 0, 1, -3deg); }
      100% { transform: scale3d(1, 1, 1); }
    }
    .animate-tada {
      animation: tada 1.5s ease-in-out infinite;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* 學習操作區特效 */
    @keyframes signFlip {
      0% { transform: rotateX(0deg) scale(1); color: #fff; }
      50% { transform: rotateX(90deg) scale(1.8); color: #fbbf24; text-shadow: 0 0 20px rgba(251, 191, 36, 1); }
      100% { transform: rotateX(180deg) scale(1.2); color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.8); }
    }
    .animate-flip {
      animation: signFlip 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      display: inline-block;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }
  </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden h-screen w-full">

  <!-- ================= 主選單 ================= -->
  <div id="menu-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 p-4">
    <div class="max-w-xl w-full bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 text-center">
      <svg class="w-20 h-20 mx-auto text-blue-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      <h1 class="text-4xl md:text-5xl font-bold mb-4">一元一次不等式</h1>
      <p class="text-slate-400 mb-8 text-lg">概念操作演示 × 四階段極限挑戰</p>
      
      <div class="flex flex-col gap-4 mt-6">
        <button onclick="goToOperation()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-8 rounded-2xl text-2xl flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-blue-500/30">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
          📖 學習操作篇 (含隨堂練習)
        </button>

        <div class="flex flex-col md:flex-row gap-4 w-full">
          <button onclick="startGame('single')" class="flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 text-white font-bold py-4 px-4 rounded-2xl text-xl md:text-2xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-cyan-500/30">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            單人練習
          </button>
          <button onclick="startGame('dual')" class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-4 px-4 rounded-2xl text-xl md:text-2xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-green-500/30">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
            雙人對戰
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= 學習操作篇 ================= -->
  <div id="operation-screen" class="hidden absolute inset-0 z-50 bg-slate-900 flex flex-col overflow-y-auto scroll-smooth">
    <div class="w-full bg-slate-800/90 backdrop-blur-md p-4 border-b border-slate-700 flex justify-between items-center sticky top-0 z-30 shadow-md">
      <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2"><span class="text-blue-400">📖 學習操作篇</span>：移項大解密</h2>
      <button onclick="goToMenu()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-bold transition-colors">返回主選單</button>
    </div>

    <div class="flex justify-center flex-wrap gap-2 md:gap-4 p-4 mt-2 sticky top-16 z-20 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 shadow-sm">
      <button id="tab-addsub" onclick="setDemoType('addsub')" class="px-6 py-2 rounded-full font-bold text-base md:text-lg transition-all border-2 border-transparent">加減移項篇</button>
      <button id="tab-multdiv" onclick="setDemoType('multdiv')" class="px-6 py-2 rounded-full font-bold text-base md:text-lg transition-all border-2 border-transparent">乘除移項篇</button>
      <button id="tab-mixed" onclick="setDemoType('mixed')" class="px-6 py-2 rounded-full font-bold text-base md:text-lg transition-all border-2 border-transparent">綜合移項篇</button>
    </div>

    <div id="demo-dynamic-content" class="flex-1 w-full max-w-5xl mx-auto p-4 md:p-8 flex flex-col gap-6">
      <!-- 內容由 JS 產生 -->
    </div>

    <div class="w-full max-w-5xl mx-auto p-4 md:p-8 pb-20 flex flex-col items-center">
      <button id="btn-demo-next" onclick="nextDemoStep()" class="w-full md:w-auto md:min-w-[300px] px-10 py-5 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black rounded-full text-xl md:text-2xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(234,179,8,0.4)]">
        下一步 ⏭
      </button>

      <div id="btn-go-game" class="hidden w-full flex flex-col md:flex-row gap-4 mt-4 animate-panel-in">
        <button onclick="startGame('single')" class="flex-1 px-8 py-5 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 text-white font-bold rounded-full text-xl md:text-2xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center justify-center gap-2">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          前往單人練習
        </button>
        <button onclick="startGame('dual')" class="flex-1 px-8 py-5 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold rounded-full text-xl md:text-2xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.4)] flex items-center justify-center gap-2">
          <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z"></path></svg>
          邀請對手對戰
        </button>
      </div>
    </div>
  </div>

  <!-- ================= 遊戲篇 (實戰挑戰) ================= -->
  <div id="game-screen" class="hidden flex h-full w-full">
    <!-- 左側 (P1 / 單人) -->
    <div id="p1-area" class="flex-1 relative transition-colors duration-300 flex flex-col items-center justify-center p-6"></div>

    <!-- 中央分隔線與計時器 (雙人專用) -->
    <div id="center-timer-area" class="w-4 md:w-6 bg-slate-800 h-full relative z-20 flex flex-col items-center justify-center shadow-2xl border-x-2 border-slate-900">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 border-2 border-yellow-400 text-white px-6 py-8 rounded-full font-bold flex flex-col items-center shadow-[0_0_20px_rgba(250,204,21,0.5)] whitespace-nowrap">
        <span id="center-stage-text" class="text-sm md:text-base text-yellow-400 mb-2 tracking-widest font-black">STAGE 1</span>
        <span id="center-time-text" class="text-4xl md:text-5xl font-mono text-white">1:00</span>
      </div>
    </div>

    <!-- 右側 (P2) -->
    <div id="p2-area" class="flex-1 relative transition-colors duration-300 flex flex-col items-center justify-center p-6"></div>
  </div>

  <!-- ================= 結算畫面 ================= -->
  <div id="gameover-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-slate-950 overflow-hidden">
    <div id="confetti-container" class="absolute inset-0 pointer-events-none z-40"></div>
    
    <div class="max-w-2xl w-full glass-panel rounded-[2.5rem] p-10 md:p-14 shadow-[0_0_50px_rgba(0,0,0,0.6)] text-center relative z-50 animate-panel-in">
      <svg id="gameover-trophy" class="w-32 h-32 mx-auto mb-6 drop-shadow-2xl" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
      <h2 class="text-2xl md:text-3xl font-bold text-white/80 mb-2 tracking-widest uppercase">挑戰結束</h2>
      <div id="winner-text" class="mb-8"></div>
      
      <!-- 雙人分數版面 -->
      <div id="dual-score-board" class="flex justify-center gap-6 md:gap-10 mb-10 hidden">
        <div class="flex-1 bg-red-950/40 border-2 border-red-500/30 rounded-3xl p-6 shadow-[0_0_20px_rgba(225,29,72,0.2)]">
          <div class="text-red-400 font-bold text-lg md:text-xl mb-2">玩家 1 (左側)</div>
          <div class="text-5xl md:text-6xl font-black text-white" id="final-p1-score"></div>
        </div>
        <div class="flex-1 bg-blue-950/40 border-2 border-blue-500/30 rounded-3xl p-6 shadow-[0_0_20px_rgba(37,99,235,0.2)]">
          <div class="text-blue-400 font-bold text-lg md:text-xl mb-2">玩家 2 (右側)</div>
          <div class="text-5xl md:text-6xl font-black text-white" id="final-p2-score"></div>
        </div>
      </div>

      <!-- 單人分數版面 -->
      <div id="single-score-board" class="flex flex-col items-center justify-center mb-10 hidden">
         <div class="bg-cyan-950/40 border-2 border-cyan-500/30 rounded-3xl p-8 shadow-[0_0_30px_rgba(6,182,212,0.2)] w-full max-w-sm">
            <div id="single-title" class="text-2xl md:text-3xl font-bold mb-4 drop-shadow-md"></div>
            <div class="text-7xl md:text-8xl font-black text-white drop-shadow-lg" id="final-single-score"></div>
            <div class="text-slate-400 mt-4 text-lg font-bold tracking-widest">總得分</div>
         </div>
      </div>

      <div class="flex flex-col md:flex-row gap-4 justify-center items-center px-4">
        <button id="btn-replay" class="w-full md:w-auto flex-1 bg-gradient-to-r from-yellow-400 to-amber-600 hover:from-yellow-300 hover:to-amber-500 text-slate-900 font-black py-4 px-8 rounded-full text-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-[0_0_20px_rgba(251,191,36,0.4)]">
          再挑戰一次
        </button>
        <button onclick="goToMenu()" class="w-full md:w-auto px-8 py-4 text-white/60 hover:text-white hover:bg-white/10 rounded-full font-bold text-lg transition-colors">
          回主選單
        </button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // === 狀態管理 ===
    // ==========================================
    const STAGE_TIMES = [60, 120, 60, 120]; 
    
    let state = {
      view: 'menu',
      mode: 'dual', // 'single' 或 'dual'
      stage: 1,
      timeLeft: 0,
      timerId: null,
      p1: { score: 0, question: null, isReviewing: false, wrongs: 0, freezeTime: 0, isReady: false, combo: 0 },
      p2: { score: 0, question: null, isReviewing: false, wrongs: 0, freezeTime: 0, isReady: false, combo: 0 },
      demo: { 
        type: 'addsub', 
        step: 0, 
        maxSteps: { addsub: 4, multdiv: 3, mixed: 3 },
        practice: {} 
      } 
    };

    // ==========================================
    // === 工具函數 ===
    // ==========================================
    const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    const shuffleArray = (array) => {
      let newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };
    const flipOperator = (op) => {
      const flips = { '>': '<', '<': '>', '≥': '≤', '≤': '≥' };
      return flips[op];
    };
    const frac = (top, bot) => `<span class="inline-flex flex-col items-center align-middle text-[0.7em] mx-1 leading-none"><span class="border-b-2 border-current px-1 pb-[2px] mb-[2px]">${top}</span><span>${bot}</span></span>`;

    // ==========================================
    // === 學習操作篇邏輯 ===
    // ==========================================
    function goToOperation() {
      state.view = 'operation';
      document.getElementById('menu-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('operation-screen').classList.remove('hidden');
      setDemoType('addsub'); 
    }

    function setDemoType(type) {
      state.demo.type = type;
      state.demo.step = 0;
      state.demo.practice = {}; 
      
      const tabs = ['addsub', 'multdiv', 'mixed'];
      tabs.forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (t === type) el.className = 'px-6 py-2 rounded-full font-bold text-base md:text-lg transition-all border-2 border-transparent bg-blue-600 text-white shadow-lg shadow-blue-500/40';
        else el.className = 'px-6 py-2 rounded-full font-bold text-base md:text-lg transition-all border-2 border-slate-600 text-slate-400 hover:bg-slate-800';
      });
      renderDemo();
    }

    function nextDemoStep() {
      const max = state.demo.maxSteps[state.demo.type];
      if (state.demo.step < max) {
        state.demo.step++;
        renderDemo();
        setTimeout(() => {
          const container = document.getElementById('operation-screen');
          container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }, 50);
      }
    }

    window.answerPrac = function(qId, opt) {
      if (state.demo.practice[qId]) return; 
      state.demo.practice[qId] = opt;
      renderDemo();
    };

    function getBtnClass(qId, opt, correctOpt) {
      const ans = state.demo.practice[qId];
      if (!ans) return "bg-slate-700 hover:bg-slate-600 text-white shadow-md hover:shadow-lg";
      if (opt === correctOpt) return "bg-green-600 text-white ring-2 ring-green-300 shadow-[0_0_15px_rgba(22,163,74,0.6)] font-black scale-105";
      if (ans === opt) return "bg-red-600 text-white line-through opacity-80";
      return "bg-slate-800 text-slate-500 opacity-50 cursor-not-allowed";
    }

    function renderDemo() {
      const contentArea = document.getElementById('demo-dynamic-content');
      const btnNext = document.getElementById('btn-demo-next');
      const btnGame = document.getElementById('btn-go-game');
      const step = state.demo.step;
      let html = '';

      if (state.demo.type === 'addsub') {
        if (step >= 0) {
          html += `
            <div class="bg-slate-800 rounded-3xl p-6 md:p-8 shadow-xl border border-slate-700 fade-in">
              <h3 class="text-2xl font-bold text-blue-400 mb-4 flex items-center gap-2"><span>1️⃣</span> 【觀念演示】加法與減法移項</h3>
              <p class="text-slate-300 mb-6 text-lg">如同天平的等量公理，不等號的兩邊同加或同減一個數，大小關係<span class="text-green-400 font-bold mx-1">不變</span>。</p>
              <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 bg-slate-900 rounded-2xl p-6 border-t-4 border-slate-500 shadow-inner">
                   <div class="text-center text-slate-400 mb-6 font-bold tracking-widest text-lg">一元一次方程式</div>
                   <div class="text-3xl md:text-4xl text-center font-serif space-y-5">
                     <div>y + 2 = 3</div>
                     ${step >= 1 ? `<div class="fade-in text-slate-400">y = 3 <span class="text-red-400 font-sans font-bold">- 2</span></div>` : ''}
                     ${step >= 2 ? `<div class="fade-in text-green-400 font-bold border-t border-slate-700 pt-4 mt-2">y = 1</div>` : ''}
                   </div>
                </div>
                <div class="flex-1 bg-slate-900 rounded-2xl p-6 border-t-4 border-blue-500 relative shadow-inner">
                   <div class="text-center text-blue-400 mb-6 font-bold tracking-widest text-lg">一元一次不等式</div>
                   <div class="text-3xl md:text-4xl text-center font-serif space-y-5">
                     <div>x + 2 > 3</div>
                     ${step >= 1 ? `<div class="fade-in text-slate-400">x > 3 <span class="text-red-400 font-sans font-bold">- 2</span></div>` : ''}
                     ${step >= 2 ? `<div class="fade-in text-green-400 font-bold border-t border-slate-700 pt-4 mt-2">x > 1</div>` : ''}
                   </div>
                </div>
              </div>
              ${step >= 2 ? `<div class="mt-8 text-center text-yellow-300 font-bold text-xl fade-in bg-yellow-500/10 py-4 rounded-xl border border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)]">💡 結論：加減移項時，不等號的方向【維持不變】！</div>` : ''}
            </div>

    // ==========================================
    // === 遊戲篇控制 (對戰/單人系統) ===
    // ==========================================
    const generateQuestion = (type) => {
      const operators = ['>', '<', '≥', '≤'];
      const op = operators[getRandomInt(0, 3)];
      
      let qText = '', correctVal = 0, correctOp = op;
      let a, b, c;
      let explanation = []; 

      if (type === 1) { 
        c = getRandomInt(-10, 10); 
        a = getRandomInt(-10, 10);
        while (a === 0) a = getRandomInt(-10, 10);
        b = c + a;
        
        let left = 'x';
        left += a > 0 ? ` + ${a}` : ` - ${Math.abs(a)}`;
        qText = `${left} ${op} ${b}`;
        correctVal = c;
        
        explanation.push(`1️⃣ 題目：${qText}`);
        const invA = a > 0 ? `- ${a}` : `+ ${Math.abs(a)}`;
        explanation.push(`2️⃣ 移項：將 ${a > 0 ? `+ ${a}` : `- ${Math.abs(a)}`} 移過去變成 ${invA}`);
        explanation.push(`3️⃣ 計算：x ${op} ${b} ${invA}`);

      } else { 
        c = getRandomInt(-10, 10);
        a = getRandomInt(-10, 10);
        while (a === 0 || a === 1) a = getRandomInt(-10, 10); 
        b = a * c;
        
        let left = a === -1 ? `-x` : `${a}x`;
        qText = `${left} ${op} ${b}`;
        correctVal = c;
        if (a < 0) correctOp = flipOperator(op);

        explanation.push(`1️⃣ 題目：${qText}`);
        explanation.push(`2️⃣ 移項：兩邊同除以 ${a}`);
        if (a < 0) {
          explanation.push(`⚠️ 陷阱：除以負數，不等號必須變號！(${op} 變 ${correctOp})`);
        } else {
          explanation.push(`💡 提示：除以正數，不等號方向不變。`);
        }
      }

      const formatOpt = (o, v) => `x ${o} ${v}`;
      const optionsSet = new Set();
      const correctStr = formatOpt(correctOp, correctVal);
      optionsSet.add(correctStr);
      explanation.push(`✅ 答案：${correctStr}`);

      optionsSet.add(formatOpt(flipOperator(correctOp), correctVal));
      
      let wrongVal1 = correctVal + (getRandomInt(1, 3) * (Math.random() > 0.5 ? 1 : -1));
      optionsSet.add(formatOpt(correctOp, wrongVal1));
      
      while (optionsSet.size < 4) {
        let rndVal = correctVal + getRandomInt(-5, 5);
        let rndOp = operators[getRandomInt(0, 3)];
        optionsSet.add(formatOpt(rndOp, rndVal));
      }

      return {
        text: qText,
        correctAnswer: correctStr,
        options: shuffleArray(Array.from(optionsSet)),
        explanation: explanation
      };
    };

    function startGame(mode = 'dual') {

      state.timerId = setInterval(gameTick, 1000);
      
      renderAll();

    function gameTick() {
      if (state.view !== 'playing') return;

      const playersToTick = state.mode === 'single' ? [state.p1] : [state.p1, state.p2];
      
      playersToTick.forEach((p, idx) => {
        if (p.freezeTime > 0) {
          p.freezeTime--;
          if (p.freezeTime === 0) {
            const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
            p.question = generateQuestion(qType);
          }
          renderPlayer(idx + 1); 
        }
      });

      if (state.timeLeft > 0) {
        state.timeLeft--;
        renderCenter();
        if(state.mode === 'single') renderPlayer(1); // 單人模式計時器在 p1 內，需要更新
      } else {
        goToNextStage();
      }
    }

    function goToNextStage() {
      if (state.stage < 4) {
        state.stage++;
        state.timeLeft = STAGE_TIMES[state.stage - 1];
        
        const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
        [state.p1, state.p2].forEach(p => {
          p.isReviewing = false;
          p.wrongs = 0;
          p.freezeTime = 0;
          p.isReady = false; 
          p.combo = 0;
          p.question = generateQuestion(qType);
        });
        renderAll();
      } else {
        endGame();
      }
    }

    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#facc15', '#ef4444', '#3b82f6', '#10b981', '#a855f7', '#ec4899', '#ffffff'];
      
      for (let i = 0; i < 120; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti-piece';
        conf.style.left = Math.random() * 100 + 'vw';
        conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        
        const w = Math.random() * 8 + 6;
        const h = Math.random() * 16 + 8;
        conf.style.width = w + 'px';
        conf.style.height = h + 'px';
        
        const duration = Math.random() * 3 + 2.5; 
        const delay = Math.random() * 1.5; 
        
        conf.style.animationDuration = duration + 's';
        conf.style.animationDelay = delay + 's';
        
        if (Math.random() > 0.7) {
          conf.style.borderRadius = '50%';
          conf.style.width = w + 'px';
          conf.style.height = w + 'px';
        }
        container.appendChild(conf);
      }
    }

    function endGame() {
      state.view = 'gameover';
      clearInterval(state.timerId);
      
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.remove('hidden');

      const winnerTextEl = document.getElementById('winner-text');
      const trophyIcon = document.getElementById('gameover-trophy');

      if (state.mode === 'single') {
         document.getElementById('dual-score-board').classList.add('hidden');
         document.getElementById('single-score-board').classList.remove('hidden');
         
         document.getElementById('final-single-score').innerText = state.p1.score;
         winnerTextEl.innerHTML = '個人挑戰結果';
         winnerTextEl.className = 'text-xl md:text-2xl font-bold text-white/80';
         
         let title = '再接再厲';
         let colorClass = 'text-slate-400';
         trophyIcon.className = 'w-32 h-32 mx-auto text-slate-400 mb-4 animate-tada';

         if (state.p1.score >= 30) { 
           title = '✨ 不等式之神 ✨'; 
           colorClass = 'text-yellow-400'; 
           trophyIcon.className = 'w-36 h-36 mx-auto text-yellow-400 mb-6 animate-tada drop-shadow-[0_0_30px_rgba(250,204,21,0.6)]';
         }
         else if (state.p1.score >= 15) { 
           title = '🌟 不等式達人 🌟'; 
           colorClass = 'text-cyan-400'; 
           trophyIcon.className = 'w-32 h-32 mx-auto text-cyan-400 mb-6 animate-tada drop-shadow-[0_0_30px_rgba(34,211,238,0.6)]';
         }
         else if (state.p1.score >= 5) { 
           title = '👍 觀念清晰 👍'; 
           colorClass = 'text-emerald-400'; 
           trophyIcon.className = 'w-32 h-32 mx-auto text-emerald-400 mb-6 animate-tada';
         }
         
         document.getElementById('single-title').innerHTML = title;
         document.getElementById('single-title').className = `text-3xl md:text-4xl font-bold mb-4 drop-shadow-md ${colorClass}`;

      } else {
         document.getElementById('dual-score-board').classList.remove('hidden');
         document.getElementById('single-score-board').classList.add('hidden');
         
         document.getElementById('final-p1-score').innerText = state.p1.score;
         document.getElementById('final-p2-score').innerText = state.p2.score;
         
         if (state.p1.score > state.p2.score) {
           winnerTextEl.innerHTML = '玩家 1 <span class="text-2xl md:text-3xl block mt-2 text-white/90 drop-shadow-none">左側霸主</span>';
           winnerTextEl.className = 'text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-rose-600 animate-pulse drop-shadow-[0_0_15px_rgba(225,29,72,0.8)]';
           trophyIcon.className = 'w-36 h-36 mx-auto text-red-500 mb-6 animate-tada drop-shadow-[0_0_30px_rgba(225,29,72,0.6)]';
         } else if (state.p2.score > state.p1.score) {
           winnerTextEl.innerHTML = '玩家 2 <span class="text-2xl md:text-3xl block mt-2 text-white/90 drop-shadow-none">右側霸主</span>';
           winnerTextEl.className = 'text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-600 animate-pulse drop-shadow-[0_0_15px_rgba(37,99,235,0.8)]';
           trophyIcon.className = 'w-36 h-36 mx-auto text-blue-500 mb-6 animate-tada drop-shadow-[0_0_30px_rgba(37,99,235,0.6)]';
         } else {
           winnerTextEl.innerHTML = '雙方平手 <span class="text-2xl md:text-3xl block mt-2 text-white/90 drop-shadow-none">旗鼓相當</span>';
           winnerTextEl.className = 'text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-amber-500 animate-pulse drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]';
           trophyIcon.className = 'w-36 h-36 mx-auto text-yellow-400 mb-6 animate-tada drop-shadow-[0_0_30px_rgba(250,204,21,0.6)]';
         }
      }

      createConfetti();
    }

    // === 動畫與特效分離控制 ===
    function triggerCorrectFeedback(pNum, combo, points, isPractice) {
      const overlay = document.getElementById(`p${pNum}-feedback-overlay`);
      const praiseContainer = document.getElementById(`p${pNum}-praise-container`);
      
      if (overlay) {
        overlay.className = 'absolute inset-0 z-0 pointer-events-none transition-colors duration-300 bg-green-300/20';
        setTimeout(() => {
          if (overlay) overlay.className = 'absolute inset-0 z-0 pointer-events-none transition-colors duration-300 bg-transparent';
        }, 300);
      }

      if (praiseContainer) {
        const level1 = ['✨ 太棒了!', '✨ 你真棒!', '✨ 你真的好棒!'];
        const level2 = ['🔥 勢不可擋!', '🔥 好帥好帥!'];
        const level3 = ['🌟 神乎其技!', '🌟 你是傳說!'];
        
        let praiseText = '';
        if (combo >= 5) praiseText = level3[Math.floor(Math.random() * level3.length)];
        else if (combo >= 3) praiseText = level2[Math.floor(Math.random() * level2.length)];
        else praiseText = level1[Math.floor(Math.random() * level1.length)];

        praiseContainer.innerHTML = `
          <div class="animate-pop-out text-5xl md:text-7xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] flex flex-col items-center">
            <span>${praiseText}</span>
            ${!isPractice ? `<span class="text-4xl md:text-5xl text-green-300 mt-2 font-mono">+${points}</span>` : ''}
          </div>
        `;
        
        setTimeout(() => {
          if (praiseContainer) praiseContainer.innerHTML = '';
        }, 800);
      }
    }

    function triggerWrongFeedback(pNum) {
      const overlay = document.getElementById(`p${pNum}-feedback-overlay`);
      if (overlay) {
        overlay.className = 'absolute inset-0 z-0 pointer-events-none transition-colors duration-300 bg-red-500/30';
        setTimeout(() => {
          if (overlay) overlay.className = 'absolute inset-0 z-0 pointer-events-none transition-colors duration-300 bg-transparent';
        }, 300);
      }
    }

    // === 遊戲內部互動處理 ===
    window.handleGameAnswer = function(pNum, answer) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      
      if (pState.freezeTime > 0 || pState.isReviewing) return;

      const isCorrect = answer === pState.question.correctAnswer;
      const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
      const isPractice = (state.stage === 1 || state.stage === 3); 

      if (isCorrect) {
        pState.combo++;
        let points = 1;
        if (pState.combo >= 5) points = 3;
        else if (pState.combo >= 3) points = 2;

        if (!isPractice) pState.score += points;
        
        pState.wrongs = 0;
        pState.question = generateQuestion(qType);
        
        renderPlayer(pNum);
        triggerCorrectFeedback(pNum, pState.combo, points, isPractice);

      } else {
        pState.combo = 0; 
        if (!isPractice) {
          pState.score = Math.max(0, pState.score - 1);
          pState.wrongs++;
          if (pState.wrongs >= 3) {
            pState.freezeTime = 10;
            pState.wrongs = 0;
          }
        } else {
          pState.isReviewing = true;
          pState.isReady = false; 
        }
        
        renderPlayer(pNum);
        triggerWrongFeedback(pNum);
      }
    };

    window.dismissReview = function(pNum) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
      pState.isReviewing = false;
      pState.question = generateQuestion(qType);
      renderPlayer(pNum);
    };

    window.toggleReady = function(pNum) {
      if (state.stage !== 1 && state.stage !== 3) return; 
      
      if (state.mode === 'single') {
         // 單人模式直接跳下一關
         goToNextStage();
      } else {
         // 雙人模式需等待對方
         const pState = pNum === 1 ? state.p1 : state.p2;
         pState.isReady = !pState.isReady; 
         if (state.p1.isReady && state.p2.isReady) goToNextStage();
         else renderPlayer(pNum);
      }
    };

    // === 渲染邏輯 ===
    function renderAll() {
      if (state.mode === 'dual') renderCenter();
      renderPlayer(1);
      if (state.mode === 'dual') renderPlayer(2);
    }

    function renderCenter() {
      if (state.mode === 'single') return; // 單人模式計時器放在 p1 內
      const stageTextEl = document.getElementById('center-stage-text');
      const timeTextEl = document.getElementById('center-time-text');
      
      const stageNames = ['階段 1 : 練習', '階段 2 : 競賽', '階段 3 : 練習', '階段 4 : 競賽'];
      stageTextEl.innerText = stageNames[state.stage - 1];
      
      const m = Math.floor(state.timeLeft / 60);
      const s = (state.timeLeft % 60).toString().padStart(2, '0');
      timeTextEl.innerText = `${m}:${s}`;

      if (state.timeLeft <= 10) {
        timeTextEl.classList.add('text-red-500');
        timeTextEl.classList.remove('text-white');
      } else {
        timeTextEl.classList.remove('text-red-500');
        timeTextEl.classList.add('text-white');
      }
    }

    function renderPlayer(pNum) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      const container = document.getElementById(`p${pNum}-area`);
      const isPractice = (state.stage === 1 || state.stage === 3);
      const isSingle = state.mode === 'single';
      
      // 單人模式統一用深藍色背景，雙人維持紅藍對抗色
      let bgClass = isSingle ? 'bg-indigo-950' : (pNum === 1 ? 'bg-rose-900' : 'bg-blue-900');
      container.className = `flex-1 relative flex flex-col items-center justify-center p-6 ${isPractice ? 'pb-24 md:pb-28' : ''} ${bgClass}`;

      let html = `
        <div id="p${pNum}-feedback-overlay" class="absolute inset-0 bg-transparent z-0 pointer-events-none transition-colors duration-300"></div>
        <div id="p${pNum}-praise-container" class="absolute inset-0 z-50 flex items-center justify-center pointer-events-none"></div>
      `;

      // 單人模式的計時器 (放在畫面上方)
      if (isSingle && pNum === 1) {
        const m = Math.floor(state.timeLeft / 60);
        const s = (state.timeLeft % 60).toString().padStart(2, '0');
        const timeColor = state.timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-white';
        html += `
          <div class="absolute top-6 z-20 flex flex-col items-center">
             <span class="text-sm md:text-base text-cyan-400 font-black tracking-widest bg-slate-900/60 px-4 py-1 rounded-full mb-1 border border-cyan-500/30">STAGE ${state.stage}</span>
             <span class="text-4xl md:text-5xl font-mono font-black ${timeColor} drop-shadow-md">${m}:${s}</span>
          </div>
        `;
      }

      if (pState.combo >= 2) {
        let bonusTip = '';
        if (!isPractice) {
          if (pState.combo >= 5) bonusTip = '<span class="text-xs ml-1 text-yellow-200">(每題+3分)</span>';
          else if (pState.combo >= 3) bonusTip = '<span class="text-xs ml-1 text-yellow-200">(每題+2分)</span>';
        }
        html += `
          <div class="absolute top-24 md:top-28 z-20 bg-gradient-to-r from-orange-500 to-red-600 text-white px-5 py-1.5 rounded-full font-black text-xl md:text-2xl shadow-[0_0_15px_rgba(249,115,22,0.8)] combo-text border-2 border-yellow-300">
            🔥 ${pState.combo} 連擊! ${bonusTip}
          </div>
        `;
      }

      // 左上角資訊列
      html += `
        <div class="absolute top-4 left-6 z-10 text-white/80 font-bold text-xl md:text-2xl flex items-center gap-3">
          ${!isSingle ? `<span>玩家 ${pNum}</span>` : '<span class="text-cyan-400">👤 單人實戰</span>'}
          ${isPractice 
            ? `<span class="bg-slate-700/80 px-3 py-1 rounded-lg text-slate-300 text-sm md:text-base flex items-center gap-1"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"></path></svg> 練習不計分</span>`
            : `<span class="bg-white/20 px-4 py-1 rounded-lg text-white shadow-sm border border-white/10">分數: ${pState.score}</span>`
          }
        </div>
      `;

      if (pState.freezeTime > 0) {
        html += `
          <div class="absolute inset-0 z-40 frozen-overlay flex flex-col items-center justify-center text-white p-6 text-center">
            <svg class="w-24 h-24 text-cyan-200 mb-6 animate-spin" style="animation-duration: 3s;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v20M17 5l-5 5-5-5M17 19l-5-5-5 5M2 12h20M5 17l5-5-5-5M19 17l-5-5 5-5"></path></svg>
            <h2 class="text-4xl md:text-5xl font-black mb-4 drop-shadow-lg text-cyan-100">連續答錯！大腦凍結</h2>
            <p class="text-3xl md:text-4xl font-bold bg-slate-900/50 px-8 py-4 rounded-full border border-cyan-400/30">解凍倒數 <span class="text-red-400 font-mono text-5xl">${pState.freezeTime}</span> 秒</p>
          </div>
        `;
      } 
      else if (pState.isReviewing) {
        html += `
          <div class="z-10 bg-slate-800/95 border-2 border-red-500/50 rounded-3xl p-6 md:p-8 w-full max-w-3xl shadow-2xl flex flex-col items-center fade-in">
            <h3 class="text-red-400 font-bold mb-6 text-2xl md:text-3xl flex items-center gap-2">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              哎呀答錯了！解題步驟
            </h3>
            <div class="text-left w-full space-y-3 mb-8">
              ${pState.question.explanation.map(step => 
                `<div class="text-white text-lg md:text-2xl p-4 rounded-xl ${step.includes('⚠️') ? 'bg-red-900/60 border border-red-500/40' : 'bg-slate-700/50'}">${step}</div>`
              ).join('')}
            </div>
            <button onclick="dismissReview(${pNum})" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-12 rounded-xl text-xl md:text-2xl transition-transform active:scale-95 w-full shadow-lg">
              我懂了，下一題！
            </button>
          </div>
        `;
      } 
      else {
        let wrongsIndicators = '';
        if (!isPractice) {
          wrongsIndicators = `
            <div class="absolute top-4 right-6 flex gap-2">
              ${[1,2,3].map(i => `
                <div class="w-4 h-4 rounded-full border-2 ${pState.wrongs >= i ? 'bg-red-500 border-red-300 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-slate-800 border-slate-600'}"></div>
              `).join('')}
            </div>
          `;
        }

        let stageTip = state.stage <= 2 ? '加減移項' : '乘除移項 (注意變號)';
        let qBoxClass = "bg-white/10 backdrop-blur-sm rounded-2xl px-6 md:px-12 py-4 w-full min-h-[140px] flex items-center justify-center text-center shadow-lg border border-white/10 mb-8";
        // 單人模式空間大，字體可以再稍微加大
        let qTextClass = `font-bold text-white tracking-widest font-serif leading-none ${isSingle ? 'text-7xl lg:text-8xl' : 'text-6xl lg:text-7xl'}`;
        
        if (pState.combo >= 10) {
          qBoxClass += " on-fire-container scale-[1.05] transition-transform duration-300";
          qTextClass += " on-fire-text";
          stageTip = '<span class="text-yellow-300 animate-pulse">🔥 火力全開！</span> ' + stageTip;
        }

        html += `
          ${wrongsIndicators}
          <div class="z-10 flex flex-col items-center w-full ${isSingle ? 'max-w-4xl mt-12' : 'max-w-2xl'}">
            <div class="text-white/60 text-sm md:text-lg font-bold tracking-wider mb-3 uppercase text-center flex items-center gap-2">
              ${isPractice ? '🎯 練習模式' : '🔥 競賽模式'} : ${stageTip}
            </div>
            <div class="${qBoxClass}">
              <h2 class="${qTextClass}">
                ${pState.question.text}
              </h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 w-full">
              ${pState.question.options.map(opt => `
                <button onclick="handleGameAnswer(${pNum}, '${opt.replace(/'/g, "\\'")}')" class="bg-white hover:bg-gray-100 text-slate-800 text-4xl ${isSingle ? 'md:text-6xl py-8' : 'md:text-5xl py-6'} font-bold rounded-2xl shadow-md transition-transform active:scale-95 active:bg-gray-300 font-serif">
                  ${opt}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }

      if (isPractice && !pState.isReviewing) {
        let btnText = isSingle ? '👌 練習夠了，進入下一階段' : (pState.isReady ? '✅ 已準備好，等待對手...' : '👌 練習夠了，進入競賽');
        html += `
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 w-full px-6 flex justify-center fade-in">
            <button onclick="toggleReady(${pNum})" class="px-8 py-3 md:py-4 rounded-full font-bold text-lg md:text-xl transition-all shadow-xl border-2 ${pState.isReady && !isSingle ? 'bg-green-500 border-green-400 text-white shadow-green-500/40 animate-pulse' : 'bg-slate-800 border-slate-600 text-white/80 hover:bg-slate-700 hover:text-white'}">
              ${btnText}
            </button>
          </div>
        `;
      }

      container.innerHTML = html;
    }
  </script>
</body>
</html>
