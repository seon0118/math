<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>不等式四階段對戰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 避免觸控設備的文字選取與雙擊放大 */
    body {
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    
    /* 凍結動畫 */
    @keyframes freezePulse {
      0% { background-color: rgba(14, 165, 233, 0.8); }
      50% { background-color: rgba(56, 189, 248, 0.9); }
      100% { background-color: rgba(14, 165, 233, 0.8); }
    }
    .frozen-overlay {
      animation: freezePulse 2s infinite;
      backdrop-filter: blur(8px);
    }

    /* 淡入動畫 */
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    /* 正增強動畫 */
    @keyframes popOut {
      0% { opacity: 0; transform: scale(0.5) translateY(20px); }
      50% { opacity: 1; transform: scale(1.2) translateY(-10px); }
      100% { opacity: 0; transform: scale(1) translateY(-40px); }
    }
    .animate-pop-out {
      animation: popOut 0.8s ease-out forwards;
      pointer-events: none;
    }
    @keyframes pulse-fast {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .combo-text {
      animation: pulse-fast 0.6s infinite;
    }
    
    /* 燃燒特效 (10連擊以上) */
    @keyframes fireGlow {
      0%, 100% {
        box-shadow: 0 0 15px 5px rgba(255, 69, 0, 0.7), inset 0 0 10px rgba(255, 140, 0, 0.5);
        border-color: rgba(255, 69, 0, 0.8);
      }
      50% {
        box-shadow: 0 0 30px 15px rgba(255, 140, 0, 0.9), inset 0 0 20px rgba(255, 215, 0, 0.7);
        border-color: rgba(255, 215, 0, 1);
      }
    }
    .on-fire-container {
      /* 將外框動畫從原本極快的 0.4s 改為舒緩的 1.5s 呼吸燈效果 */
      animation: fireGlow 1.5s infinite ease-in-out;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,69,0,0.25)) !important;
    }
    .on-fire-text {
      /* 移除文字閃爍動畫，改為固定的高溫發光文字陰影 */
      color: #fff3e0;
      text-shadow: 0 0 15px rgba(255,69,0,0.8), 0 0 30px rgba(255,140,0,0.8);
    }
  </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden h-screen w-full">

  <!-- ================= 主選單 ================= -->
  <div id="menu-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 p-4">
    <div class="max-w-xl w-full bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 text-center">
      <svg class="w-20 h-20 mx-auto text-yellow-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <h1 class="text-4xl md:text-5xl font-bold mb-4">不等式：四階段極限挑戰</h1>
      <p class="text-slate-400 mb-8 text-lg">同側並排・雙人觸控・刷題與競賽</p>
      
      <div class="bg-slate-700/50 rounded-xl p-6 mb-8 text-left text-sm md:text-base space-y-3">
        <h3 class="font-bold text-xl mb-3 text-center text-blue-300">🎮 遊戲規則 (共 6 分鐘)</h3>
        <p><span class="text-green-400 font-bold">階段一 (1分鐘)：加減練習</span> ➜ 不計分，錯題即時檢討。<b>(雙方OK可跳過)</b></p>
        <p><span class="text-red-400 font-bold">階段二 (2分鐘)：加減競賽</span> ➜ 答對+1，答錯-1。<b>連錯3題凍結10秒！</b></p>
        <p><span class="text-green-400 font-bold">階段三 (1分鐘)：乘除練習</span> ➜ 不計分，錯題即時檢討。<b>(雙方OK可跳過)</b></p>
        <p><span class="text-red-400 font-bold">階段四 (2分鐘)：乘除競賽</span> ➜ 答對+1，答錯-1。<b>連錯3題凍結10秒！</b></p>
      </div>

      <button onclick="startGame()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-white font-bold py-5 px-8 rounded-full text-2xl flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-green-500/30">
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
        開始四階段挑戰
      </button>
    </div>
  </div>

  <!-- ================= 遊戲畫面 ================= -->
  <div id="game-screen" class="hidden flex flex-row h-full w-full">
    <!-- 玩家 1 (左側) -->
    <div id="p1-area" class="flex-1 relative bg-rose-900 transition-colors duration-300 flex flex-col items-center justify-center p-6"></div>

    <!-- 中央分隔線與計時器 -->
    <div class="w-4 md:w-6 bg-slate-800 h-full relative z-20 flex flex-col items-center justify-center shadow-2xl border-x-2 border-slate-900">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 border-2 border-yellow-400 text-white px-6 py-8 rounded-full font-bold flex flex-col items-center shadow-[0_0_20px_rgba(250,204,21,0.5)] whitespace-nowrap">
        <span id="center-stage-text" class="text-sm md:text-base text-yellow-400 mb-2 tracking-widest font-black">STAGE 1</span>
        <span id="center-time-text" class="text-4xl md:text-5xl font-mono text-white">1:00</span>
      </div>
    </div>

    <!-- 玩家 2 (右側) -->
    <div id="p2-area" class="flex-1 relative bg-blue-900 transition-colors duration-300 flex flex-col items-center justify-center p-6"></div>
  </div>

  <!-- ================= 結算畫面 ================= -->
  <div id="gameover-screen" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 p-4">
    <div class="max-w-md w-full bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 text-center">
      <svg class="w-24 h-24 mx-auto text-yellow-400 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
      <h1 class="text-5xl font-bold mb-4">挑戰結束！</h1>
      <p class="text-2xl mb-8" id="winner-text"></p>
      
      <div class="flex justify-center gap-8 mb-10 text-2xl">
        <div class="text-red-400 font-bold">玩家1: <span id="final-p1-score"></span></div>
        <div class="text-blue-400 font-bold">玩家2: <span id="final-p2-score"></span></div>
      </div>

      <button onclick="startGame()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 px-8 rounded-full text-xl flex items-center justify-center gap-2 transition-transform active:scale-95">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        再挑戰一次
      </button>
      <button onclick="goToMenu()" class="w-full mt-4 text-slate-400 hover:text-white py-2 text-lg">
        回主畫面
      </button>
    </div>
  </div>

  <script>
    // === 遊戲設定 ===
    const STAGE_TIMES = [60, 120, 60, 120]; // 階段1~4的秒數
    
    // === 狀態管理 ===
    let state = {
      view: 'menu',
      stage: 1,
      timeLeft: 0,
      timerId: null,
      p1: { score: 0, question: null, isReviewing: false, wrongs: 0, freezeTime: 0, feedback: null, isReady: false, combo: 0, showPraise: false, lastGain: 0, animId: 0 },
      p2: { score: 0, question: null, isReviewing: false, wrongs: 0, freezeTime: 0, feedback: null, isReady: false, combo: 0, showPraise: false, lastGain: 0, animId: 0 }
    };

    // === 工具函數 ===
    const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
    
    const shuffleArray = (array) => {
      let newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    const flipOperator = (op) => {
      const flips = { '>': '<', '<': '>', '≥': '≤', '≤': '≥' };
      return flips[op];
    };

    // === 題目產生器 ===
    // type: 1 (加減), 2 (乘除)
    const generateQuestion = (type) => {
      const operators = ['>', '<', '≥', '≤'];
      const op = operators[getRandomInt(0, 3)];
      
      let qText = '', correctVal = 0, correctOp = op;
      let a, b, c;
      let explanation = []; 

      if (type === 1) { // 加減
        c = getRandomInt(-10, 10); 
        a = getRandomInt(-10, 10);
        while (a === 0) a = getRandomInt(-10, 10);
        b = c + a;
        
        let left = 'x';
        left += a > 0 ? ` + ${a}` : ` - ${Math.abs(a)}`;
        qText = `${left} ${op} ${b}`;
        correctVal = c;
        
        explanation.push(`1️⃣ 題目：${qText}`);
        const invA = a > 0 ? `- ${a}` : `+ ${Math.abs(a)}`;
        explanation.push(`2️⃣ 移項：將 ${a > 0 ? `+ ${a}` : `- ${Math.abs(a)}`} 移過去變成 ${invA}`);
        explanation.push(`3️⃣ 計算：x ${op} ${b} ${invA}`);

      } else { // 乘除
        c = getRandomInt(-10, 10);
        a = getRandomInt(-10, 10);
        while (a === 0 || a === 1) a = getRandomInt(-10, 10); 
        b = a * c;
        
        let left = a === -1 ? `-x` : `${a}x`;
        qText = `${left} ${op} ${b}`;
        correctVal = c;
        if (a < 0) correctOp = flipOperator(op);

        explanation.push(`1️⃣ 題目：${qText}`);
        explanation.push(`2️⃣ 移項：兩邊同除以 ${a}`);
        if (a < 0) {
          explanation.push(`⚠️ 陷阱：除以負數，不等號必須變號！(${op} 變 ${correctOp})`);
        } else {
          explanation.push(`💡 提示：除以正數，不等號方向不變。`);
        }
      }

      const formatOpt = (o, v) => `x ${o} ${v}`;
      const optionsSet = new Set();
      const correctStr = formatOpt(correctOp, correctVal);
      optionsSet.add(correctStr);
      explanation.push(`✅ 答案：${correctStr}`);

      optionsSet.add(formatOpt(flipOperator(correctOp), correctVal));
      
      let wrongVal1 = correctVal + (getRandomInt(1, 3) * (Math.random() > 0.5 ? 1 : -1));
      optionsSet.add(formatOpt(correctOp, wrongVal1));
      
      while (optionsSet.size < 4) {
        let rndVal = correctVal + getRandomInt(-5, 5);
        let rndOp = operators[getRandomInt(0, 3)];
        optionsSet.add(formatOpt(rndOp, rndVal));
      }

      return {
        text: qText,
        correctAnswer: correctStr,
        options: shuffleArray(Array.from(optionsSet)),
        explanation: explanation
      };
    };

    // === 遊戲流程控制 ===
    function startGame() {
      state.view = 'playing';
      state.stage = 1;
      state.timeLeft = STAGE_TIMES[0];
      
      // 初始化玩家狀態
      [state.p1, state.p2].forEach(p => {
        p.score = 0;
        p.isReviewing = false;
        p.wrongs = 0;
        p.freezeTime = 0;
        p.isReady = false;
        p.combo = 0;
        p.showPraise = false;
        p.question = generateQuestion(1); // 階段1是加減
      });

      document.getElementById('menu-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');

      if (state.timerId) clearInterval(state.timerId);
      state.timerId = setInterval(gameTick, 1000);
      
      renderAll();
    }

    function goToMenu() {
      clearInterval(state.timerId);
      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('menu-screen').classList.remove('hidden');
    }

    function gameTick() {
      if (state.view !== 'playing') return;

      // 處理凍結倒數
      let needsRender = false;
      [state.p1, state.p2].forEach((p, idx) => {
        if (p.freezeTime > 0) {
          p.freezeTime--;
          if (p.freezeTime === 0) {
            // 凍結結束，換新題目
            const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
            p.question = generateQuestion(qType);
          }
          renderPlayer(idx + 1); // 局部更新
        }
      });

      // 處理大倒數計時
      if (state.timeLeft > 0) {
        state.timeLeft--;
        renderCenter();
      } else {
        // 階段切換
        goToNextStage();
      }
    }

    function goToNextStage() {
      if (state.stage < 4) {
        state.stage++;
        state.timeLeft = STAGE_TIMES[state.stage - 1];
        
        const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
        [state.p1, state.p2].forEach(p => {
          p.isReviewing = false;
          p.wrongs = 0;
          p.freezeTime = 0;
          p.isReady = false; // 重置準備狀態
          p.combo = 0;
          p.showPraise = false;
          p.question = generateQuestion(qType);
        });
        renderAll();
      } else {
        // 遊戲結束
        endGame();
      }
    }

    function endGame() {
      state.view = 'gameover';
      clearInterval(state.timerId);
      
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.remove('hidden');

      document.getElementById('final-p1-score').innerText = state.p1.score;
      document.getElementById('final-p2-score').innerText = state.p2.score;

      const winnerTextEl = document.getElementById('winner-text');
      if (state.p1.score > state.p2.score) {
        winnerTextEl.innerHTML = '<span class="text-red-400 font-bold">玩家 1 (左側) 獲勝！</span>';
      } else if (state.p2.score > state.p1.score) {
        winnerTextEl.innerHTML = '<span class="text-blue-400 font-bold">玩家 2 (右側) 獲勝！</span>';
      } else {
        winnerTextEl.innerHTML = '<span class="text-yellow-400 font-bold">雙方平手！</span>';
      }
    }

    // === 互動處理 ===
    window.handleAnswer = function(pNum, answer) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      
      // 防呆：凍結中或檢討中不可作答
      if (pState.freezeTime > 0 || pState.isReviewing) return;

      const isCorrect = answer === pState.question.correctAnswer;
      const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
      const isPractice = (state.stage === 1 || state.stage === 3); // 1, 3是練習(不計分, 要檢討)

      // 回饋閃爍
      pState.feedback = isCorrect ? 'correct' : 'wrong';
      renderPlayer(pNum);
      setTimeout(() => {
        pState.feedback = null;
        if(state.view === 'playing') renderPlayer(pNum);
      }, 300);

      if (isCorrect) {
        pState.combo++;
        let points = 1;
        // 連擊加分系統：連對3題+2分，連對5題+3分
        if (pState.combo >= 5) points = 3;
        else if (pState.combo >= 3) points = 2;

        if (!isPractice) pState.score += points;
        
        pState.lastGain = points;
        pState.showPraise = true;
        pState.wrongs = 0;
        
        // 設定獨立ID防止快速點擊導致的動畫提早消失
        const currentAnimId = Date.now();
        pState.animId = currentAnimId;
        setTimeout(() => {
          if (pState.animId === currentAnimId) {
            pState.showPraise = false;
            if (state.view === 'playing') renderPlayer(pNum);
          }
        }, 800);

        pState.question = generateQuestion(qType);
      } else {
        pState.combo = 0; // 答錯中斷連擊
        if (!isPractice) {
          pState.score = Math.max(0, pState.score - 1);
          pState.wrongs++;
          if (pState.wrongs >= 3) {
            pState.freezeTime = 10;
            pState.wrongs = 0;
          }
        } else {
          // 練習模式：錯了進入檢討
          pState.isReviewing = true;
          pState.isReady = false; // 強制取消準備狀態，必須確實看完檢討
        }
      }
      // 因為setTimeout會有延遲重繪，這裡先強制重繪一次確保狀態更新
      renderPlayer(pNum);
    };

    window.dismissReview = function(pNum) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      const qType = (state.stage === 1 || state.stage === 2) ? 1 : 2;
      pState.isReviewing = false;
      pState.question = generateQuestion(qType);
      renderPlayer(pNum);
    };

    window.toggleReady = function(pNum) {
      if (state.stage !== 1 && state.stage !== 3) return; // 僅限練習階段可跳過
      
      const pState = pNum === 1 ? state.p1 : state.p2;
      pState.isReady = !pState.isReady; // 切換準備狀態

      // 檢查是否雙方都準備好了
      if (state.p1.isReady && state.p2.isReady) {
        goToNextStage();
      } else {
        renderPlayer(pNum);
      }
    };

    // === 渲染邏輯 ===
    function renderAll() {
      renderCenter();
      renderPlayer(1);
      renderPlayer(2);
    }

    function renderCenter() {
      const stageTextEl = document.getElementById('center-stage-text');
      const timeTextEl = document.getElementById('center-time-text');
      
      const stageNames = ['階段 1 : 練習', '階段 2 : 競賽', '階段 3 : 練習', '階段 4 : 競賽'];
      stageTextEl.innerText = stageNames[state.stage - 1];
      
      const m = Math.floor(state.timeLeft / 60);
      const s = (state.timeLeft % 60).toString().padStart(2, '0');
      timeTextEl.innerText = `${m}:${s}`;

      // 倒數10秒變紅
      if (state.timeLeft <= 10) {
        timeTextEl.classList.add('text-red-500');
        timeTextEl.classList.remove('text-white');
      } else {
        timeTextEl.classList.remove('text-red-500');
        timeTextEl.classList.add('text-white');
      }
    }

    function renderPlayer(pNum) {
      const pState = pNum === 1 ? state.p1 : state.p2;
      const container = document.getElementById(`p${pNum}-area`);
      const isPractice = (state.stage === 1 || state.stage === 3);
      
      // 1. 固定背景色，移除原本刺眼的背景切換與縮放動畫
      let bgClass = pNum === 1 ? 'bg-rose-900' : 'bg-blue-900';
      
      // 2. 移除 transition-all 與 scale，讓版面保持穩定不跳動
      container.className = `flex-1 relative flex flex-col items-center justify-center p-6 ${isPractice ? 'pb-24 md:pb-28' : ''} ${bgClass}`;

      let html = '';

      // 3. 改用「柔和的半透明光暈層」來代替整面閃屏
      let overlayColor = 'bg-transparent';
      if (pState.feedback === 'correct') overlayColor = 'bg-green-300/10'; // 答對時只給 10% 透明度的微綠光
      if (pState.feedback === 'wrong') overlayColor = 'bg-red-500/25';    // 答錯時給 25% 透明度的微紅光
      
      html += `<div class="absolute inset-0 ${overlayColor} z-0 pointer-events-none transition-colors duration-300"></div>`;

      // 正增強浮動動畫 (Praise Popup)
      if (pState.showPraise) {
        const level1 = ['✨ 太棒了!', '✨ 你真棒!', '✨ 你真的好棒!'];
        const level2 = ['🔥 勢不可擋!', '🔥 好帥好帥!'];
        const level3 = ['🌟 神乎其技!', '🌟 你是傳說!'];
        
        let praiseText = '';
        // 利用 animId (時間戳) 當作隨機種子，確保該次答對的文字在動畫期間不會因為重繪而閃動變化
        const randIdx = pState.animId; 
        
        if (pState.combo >= 5) praiseText = level3[randIdx % level3.length];
        else if (pState.combo >= 3) praiseText = level2[randIdx % level2.length];
        else praiseText = level1[randIdx % level1.length];

        html += `
          <div class="absolute inset-0 z-50 flex items-center justify-center pointer-events-none">
            <div class="animate-pop-out text-5xl md:text-7xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] flex flex-col items-center">
              <span>${praiseText}</span>
              ${!isPractice ? `<span class="text-4xl md:text-5xl text-green-300 mt-2 font-mono">+${pState.lastGain}</span>` : ''}
            </div>
          </div>
        `;
      }

      // 連擊顯示標籤
      if (pState.combo >= 2) {
        let bonusTip = '';
        if (!isPractice) {
          if (pState.combo >= 5) bonusTip = '<span class="text-xs ml-1 text-yellow-200">(每題+3分)</span>';
          else if (pState.combo >= 3) bonusTip = '<span class="text-xs ml-1 text-yellow-200">(每題+2分)</span>';
        }
        html += `
          <div class="absolute top-16 z-20 bg-gradient-to-r from-orange-500 to-red-600 text-white px-5 py-1.5 rounded-full font-black text-xl md:text-2xl shadow-[0_0_15px_rgba(249,115,22,0.8)] combo-text border-2 border-yellow-300">
            🔥 ${pState.combo} 連擊! ${bonusTip}
          </div>
        `;
      }

      // 左上角資訊列
      html += `
        <div class="absolute top-4 left-6 z-10 text-white/80 font-bold text-xl md:text-2xl flex items-center gap-3">
          <span>玩家 ${pNum}</span>
          ${isPractice 
            ? `<span class="bg-slate-700/80 px-3 py-1 rounded-lg text-slate-300 text-sm md:text-base flex items-center gap-1"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a4 4 0 00-4 4v1H5a1 1 0 00-.994.89l-1 9A1 1 0 004 18h12a1 1 0 00.994-1.11l-1-9A1 1 0 0015 7h-1V6a4 4 0 00-4-4zm2 5V6a2 2 0 10-4 0v1h4zm-6 3a1 1 0 112 0 1 1 0 01-2 0zm7-1a1 1 0 100 2 1 1 0 000-2z" clip-rule="evenodd"></path></svg> 練習不計分</span>`
            : `<span class="bg-white/20 px-4 py-1 rounded-lg text-white shadow-sm">分數: ${pState.score}</span>`
          }
        </div>
      `;

      // 狀態 1: 凍結中
      if (pState.freezeTime > 0) {
        html += `
          <div class="absolute inset-0 z-40 frozen-overlay flex flex-col items-center justify-center text-white p-6 text-center">
            <svg class="w-24 h-24 text-blue-200 mb-6 animate-spin" style="animation-duration: 3s;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v20M17 5l-5 5-5-5M17 19l-5-5-5 5M2 12h20M5 17l5-5-5-5M19 17l-5-5 5-5"></path></svg>
            <h2 class="text-4xl md:text-5xl font-black mb-4 drop-shadow-lg text-blue-100">連續答錯！大腦凍結</h2>
            <p class="text-3xl md:text-4xl font-bold bg-blue-900/50 px-8 py-4 rounded-full border border-blue-400/30">解凍倒數 <span class="text-red-400 font-mono text-5xl">${pState.freezeTime}</span> 秒</p>
          </div>
        `;
      } 
      // 狀態 2: 檢討模式 (僅限練習階段)
      else if (pState.isReviewing) {
        html += `
          <div class="z-10 bg-slate-800/95 border-2 border-red-500/50 rounded-3xl p-6 md:p-8 w-full max-w-2xl shadow-2xl flex flex-col items-center fade-in">
            <h3 class="text-red-400 font-bold mb-6 text-2xl md:text-3xl flex items-center gap-2">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              哎呀答錯了！解題步驟
            </h3>
            <div class="text-left w-full space-y-3 mb-8">
              ${pState.question.explanation.map(step => 
                `<div class="text-white text-lg md:text-xl p-3 rounded-lg ${step.includes('⚠️') ? 'bg-red-900/60 border border-red-500/40' : 'bg-slate-700/50'}">${step}</div>`
              ).join('')}
            </div>
            <button onclick="dismissReview(${pNum})" class="bg-green-600 hover:bg-green-500 text-white font-bold py-4 px-12 rounded-xl text-xl md:text-2xl transition-transform active:scale-95 w-full shadow-lg">
              我懂了，下一題！
            </button>
          </div>
        `;
      } 
      // 狀態 3: 正常作答模式
      else {
        // 競賽模式的錯誤提示燈 (連錯次數)
        let wrongsIndicators = '';
        if (!isPractice) {
          wrongsIndicators = `
            <div class="absolute top-4 right-6 flex gap-2">
              ${[1,2,3].map(i => `
                <div class="w-4 h-4 rounded-full border-2 ${pState.wrongs >= i ? 'bg-red-500 border-red-300 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-slate-800 border-slate-600'}"></div>
              `).join('')}
            </div>
          `;
        }

        let stageTip = state.stage <= 2 ? '加減移項' : '乘除移項 (注意變號)';

        // 判斷是否達成 10 連擊燃燒狀態
        let qBoxClass = "bg-white/10 backdrop-blur-sm rounded-2xl px-6 md:px-12 py-8 w-full text-center shadow-lg border border-white/10 mb-8";
        let qTextClass = "text-6xl lg:text-7xl font-bold text-white tracking-widest font-serif";
        if (pState.combo >= 10) {
          qBoxClass += " on-fire-container scale-[1.05] transition-transform duration-300";
          qTextClass += " on-fire-text";
          stageTip = '<span class="text-yellow-300 animate-pulse">🔥 火力全開！</span> ' + stageTip;
        }

        html += `
          ${wrongsIndicators}
          <div class="z-10 flex flex-col items-center w-full max-w-2xl fade-in">
            <div class="text-white/60 text-sm md:text-base font-bold tracking-wider mb-2 uppercase text-center flex items-center gap-2">
              ${isPractice ? '🎯 練習模式' : '🔥 競賽模式'} : ${stageTip}
            </div>
            <div class="${qBoxClass}">
              <h2 class="${qTextClass}">
                ${pState.question.text}
              </h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
              ${pState.question.options.map(opt => `
                <button onclick="handleAnswer(${pNum}, '${opt.replace(/'/g, "\\'")}')" class="bg-white hover:bg-gray-100 text-slate-800 text-4xl md:text-5xl font-bold py-6 rounded-2xl shadow-md transition-transform active:scale-95 active:bg-gray-300 font-serif">
                  ${opt}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }

      // 如果是練習模式，加入「準備進入下一關」按鈕 (檢討中不可見)
      if (isPractice && !pState.isReviewing) {
        html += `
          <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 w-full px-6 flex justify-center fade-in">
            <button onclick="toggleReady(${pNum})" class="px-8 py-3 md:py-4 rounded-full font-bold text-lg md:text-xl transition-all shadow-xl border-2 ${pState.isReady ? 'bg-green-500 border-green-400 text-white shadow-green-500/40 animate-pulse' : 'bg-slate-800 border-slate-600 text-white/80 hover:bg-slate-700 hover:text-white'}">
              ${pState.isReady ? '✅ 已準備好，等待對手...' : '👌 練習夠了，進入競賽'}
            </button>
          </div>
        `;
      }

      container.innerHTML = html;
    }
  </script>
</body>
</html>
