<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時碼表 (音量加強版)</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        #display {
            font-size: 80px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
            font-variant-numeric: tabular-nums;
        }
        .controls, .test-controls, .volume-controls {
            margin-bottom: 20px;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-start { background-color: #4CAF50; color: white; }
        .btn-start:hover { background-color: #45a049; }
        .btn-pause { background-color: #f0ad4e; color: white; }
        .btn-pause:hover { background-color: #ec971f; }
        .btn-reset { background-color: #d9534f; color: white; }
        .btn-reset:hover { background-color: #c9302c; }
        
        .btn-test { background-color: #5bc0de; color: white; font-size: 16px; }
        .btn-test:hover { background-color: #31b0d5; }

        .volume-controls {
            background-color: #eef;
            padding: 15px;
            border-radius: 8px;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }

        hr {
            border: 0;
            height: 1px;
            background: #ddd;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="display">00:00</div>
    
    <div class="controls">
        <button class="btn-start" onclick="startTimer()">開始</button>
        <button class="btn-pause" onclick="pauseTimer()">暫停</button>
        <button class="btn-reset" onclick="resetTimer()">重置</button>
    </div>

    <div class="volume-controls">
        <label for="volumeSlider"><strong>強制放大音量：<span id="volumeValue">3</span> 倍</strong></label>
        <input type="range" id="volumeSlider" min="1" max="10" step="0.5" value="3" onchange="updateVolume(this.value)">
    </div>

    <hr>

    <div class="test-controls">
        <p><strong>音效測試區</strong></p>
        <button class="btn-test" onclick="testSound('short')">測試：9分鐘短鈴</button>
        <button class="btn-test" onclick="testSound('long')">測試：10分鐘長鈴</button>
    </div>
</div>

<audio id="shortBell" crossorigin="anonymous" src="https://raw.githubusercontent.com/seon0118/math/main/%E7%9F%AD%E9%88%B4.wav" preload="auto"></audio>
<audio id="longBell" crossorigin="anonymous" src="https://raw.githubusercontent.com/seon0118/math/main/%E9%95%B7%E9%88%B4.wav" preload="auto"></audio>

<script>
    let timerInterval;
    let seconds = 0;
    let isRunning = false;
    let shortBellPlayed = false; 
    let longBellPlayed = false;

    // Web Audio API 變數
    let audioCtx;
    let gainNode;
    let audioInitialized = false;

    const display = document.getElementById('display');
    const shortBellAudio = document.getElementById('shortBell');
    const longBellAudio = document.getElementById('longBell');
    const volumeValueDisplay = document.getElementById('volumeValue');

    // 初始化音訊放大器
    function initAudio() {
        if (audioInitialized) return; // 避免重複初始化
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        gainNode = audioCtx.createGain();

        // 設定初始放大倍率
        gainNode.gain.value = document.getElementById('volumeSlider').value;

        // 綁定音檔與放大器
        const shortSource = audioCtx.createMediaElementSource(shortBellAudio);
        const longSource = audioCtx.createMediaElementSource(longBellAudio);

        shortSource.connect(gainNode).connect(audioCtx.destination);
        longSource.connect(gainNode).connect(audioCtx.destination);

        audioInitialized = true;
    }

    // 處理音訊狀態，確保瀏覽器允許發聲
    function ensureAudioContext() {
        initAudio();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // 更新放大倍率
    function updateVolume(value) {
        volumeValueDisplay.textContent = value;
        if (gainNode) {
            gainNode.gain.value = value;
        }
    }

    function updateDisplay() {
        let mins = Math.floor(seconds / 60);
        let secs = seconds % 60;
        display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        checkAlarms();
    }

    function checkAlarms() {
        if (seconds === 540 && !shortBellPlayed) {
            ensureAudioContext();
            shortBellAudio.currentTime = 0;
            shortBellAudio.play();
            shortBellPlayed = true;
        }
        
        if (seconds === 600 && !longBellPlayed) {
            ensureAudioContext();
            longBellAudio.currentTime = 0;
            longBellAudio.play();
            longBellPlayed = true;
        }
    }

    function startTimer() {
        ensureAudioContext(); // 使用者點擊時解除音效封鎖
        if (!isRunning) {
            isRunning = true;
            timerInterval = setInterval(() => {
                seconds++;
                updateDisplay();
            }, 1000);
        }
    }

    function pauseTimer() {
        isRunning = false;
        clearInterval(timerInterval);
    }

    function resetTimer() {
        isRunning = false;
        clearInterval(timerInterval);
        seconds = 0;
        shortBellPlayed = false;
        longBellPlayed = false;
        updateDisplay();
    }

    function testSound(type) {
        ensureAudioContext(); // 使用者點擊時解除音效封鎖
        if (type === 'short') {
            shortBellAudio.currentTime = 0;
            shortBellAudio.play();
        } else if (type === 'long') {
            longBellAudio.currentTime = 0;
            longBellAudio.play();
        }
    }
</script>

</body>
</html>
