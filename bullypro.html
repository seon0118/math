<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路霸凌多重結局體驗 (沉浸擴充版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #121212; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .phone-container { width: 375px; height: 812px; background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); overflow: hidden; position: relative; border: 8px solid #222; }
        @media (max-width: 400px) {
            .phone-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 50% { transform: translateX(4px); } 75% { transform: translateX(-4px); } }
        @keyframes floatText { 0% { opacity: 0; transform: translateY(100vh) scale(0.5); } 50% { opacity: 1; transform: translateY(50vh) scale(1.2); } 100% { opacity: 0; transform: translateY(-20vh) scale(0.8); } }
        @keyframes pulseRed { 0% { background-color: rgba(239, 68, 68, 0); } 50% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: rgba(239, 68, 68, 0); } }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-fade-in-left { animation: fadeInLeft 0.4s ease-out forwards; }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        .floating-word { position: absolute; color: rgba(255, 255, 255, 0.9); font-weight: bold; pointer-events: none; animation: floatText linear forwards; text-shadow: 0 0 15px rgba(255,0,0,0.9); }
        .screen-flash { position: absolute; inset: 0; pointer-events: none; animation: pulseRed 2s infinite; z-index: 50; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內聯 SVG 圖示庫 ---
        const Icons = {
            MessageCircle: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>,
            AlertOctagon: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Smartphone: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>,
            Heart: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            ChevronLeft: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
            Search: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
            WifiOff: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="2" y1="2" x2="22" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/><path d="M16.85 11.15a10 10 0 0 1 2.22 1.67"/><path d="M5 12.55a10 10 0 0 1 5.17-2.39"/></svg>,
            ShieldCheck: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>,
            Ghost: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/></svg>,
            Swords: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"/><line x1="5" y1="14" x2="9" y2="18"/><line x1="7" y1="17" x2="4" y2="20"/><line x1="3" y1="19" x2="5" y2="21"/></svg>,
            Landmark: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/></svg>,
            HeartHandshake: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.66"/><path d="m18 15-2-2"/><path d="m15 18-2-2"/></svg>,
            UserX: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="22" y2="13"/><line x1="22" y1="8" x2="17" y2="13"/></svg>,
            Skull: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></svg>,
            RotateCcw: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Wifi: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>,
            Battery: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" y1="11" x2="22" y2="13"/></svg>,
            Users: ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        };

        const CyberbullyingSim = () => {
            const [scene, setScene] = useState('intro'); 
            const [uiView, setUiView] = useState('none'); // feed, chat, forum, text, outro, climax
            const [isShaking, setIsShaking] = useState(false);
            const [activeChoice, setActiveChoice] = useState(null);
            const [endingType, setEndingType] = useState('none');
            
            // 資料狀態
            const [feedComments, setFeedComments] = useState([]);
            const [chatData, setChatData] = useState({ theme: 'ig', title: '', messages: [] });
            const [forumPosts, setForumPosts] = useState([]);
            const [textLines, setTextLines] = useState([]);
            
            const messagesEndRef = useRef(null);
            const delay = (ms) => new Promise(res => setTimeout(res, ms));

            const scrollToBottom = () => {
                if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => { scrollToBottom(); }, [feedComments, chatData.messages, forumPosts, textLines]);

            const triggerShake = (duration = 200) => {
                setIsShaking(true);
                setTimeout(() => setIsShaking(false), duration);
            };

            // --- 核心劇情引擎 ---
            useEffect(() => {
                let isCancelled = false;
                
                const updateChat = (newMsg) => {
                    if(!isCancelled) setChatData(prev => ({ ...prev, messages: [...prev.messages, { id: Date.now()+Math.random(), ...newMsg }] }));
                };

                const runScenario = async () => {
                    if (scene === 'feed') {
                        setUiView('feed');
                        const initialComments = [
                            { user: 'ting_0905', text: '這人真的很噁心，偷拿班費還有心情發文？' },
                            { user: 'hater_A', text: '難怪最近花錢這麼闊綽，笑死' },
                            { user: 'classmate_chen', text: '平常裝乖，背地裡手腳這麼不乾淨🤮' },
                            { user: 'hater_B', text: '小偷趕快退學啦，看了就討厭' }
                        ];
                        await delay(800);
                        for (let c of initialComments) {
                            if (isCancelled) return;
                            setFeedComments(prev => [...prev, { id: Date.now()+Math.random(), ...c }]);
                            triggerShake(100);
                            await delay(1200);
                        }
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【突發狀況】你的貼文突然湧入大量指控你「偷班費」的留言...",
                                options: [
                                    { label: "直接封鎖這些人，當作沒看到", action: () => { setActiveChoice(null); setEndingType('good_early'); setScene('outro'); } },
                                    { label: "在貼文底下留言澄清自己沒有拿", action: () => { setActiveChoice(null); setScene('calm_reply'); } },
                                    { label: "私訊同班的好兄弟「小傑」問清楚", action: () => { setActiveChoice(null); setScene('ask_friend_jie'); } },
                                    { label: "氣到刪除貼文，退出IG", action: () => { setActiveChoice(null); setScene('dm_escalation'); } }
                                ]
                            });
                        }
                    }
                    
                    else if (scene === 'calm_reply') {
                        setFeedComments(prev => [...prev, { id: 'r1', user: '你', text: '請問這是什麼意思？我從來沒有拿過班費！', isUser: true }]);
                        await delay(1500);
                        setFeedComments(prev => [...prev, { id: 'r2', user: 'ting_0905', text: '還裝？有人親眼看到你翻總務的抽屜啦！' }]);
                        await delay(1000);
                        setFeedComments(prev => [...prev, { id: 'r3', user: 'hater_A', text: '不要臉天下無敵，大家去私訊灌爆他！' }]);
                        await delay(2000);
                        if (!isCancelled) setScene('dm_escalation');
                    }

                    else if (scene === 'ask_friend_jie') {
                        setUiView('chat');
                        setChatData({ theme: 'line', title: '小傑 (死黨)', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '小傑，為什麼大家突然在IG罵我偷班費？發生什麼事了？' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '小傑', text: '你還不知道嗎？婷婷在班群說班費不見了，還說那天放學只有你一個人在教室。' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '小傑', text: '現在班上的人都很生氣，說要抵制你...你要不要趕快解釋？' });
                        await delay(1500);
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【謠言源頭】原來是同學「婷婷」在班群帶風向...",
                                options: [
                                    { label: "私訊婷婷跟她對質", action: () => { setActiveChoice(null); setScene('confront_ting'); } },
                                    { label: "直接在班級群組發澄清文", action: () => { setActiveChoice(null); setScene('class_group_clarify'); } },
                                    { label: "拜託班長幫忙調解", action: () => { setActiveChoice(null); setScene('ask_monitor'); } }
                                ]
                            });
                        }
                    }

                    else if (scene === 'confront_ting') {
                        setChatData({ theme: 'line', title: '婷婷', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '婷婷，你為什麼要在班群亂說話？我根本沒碰班費！' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '婷婷', text: '敢做不敢當喔？我親眼看到你靠近總務的座位的啦，少在那邊裝無辜。' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '婷婷', text: '你這種人真的有夠噁心，我要把你這副嘴臉截圖發到論壇上給大家看！' });
                        triggerShake();
                        await delay(2500);
                        if (!isCancelled) setScene('forum_doxxing');
                    }

                    else if (scene === 'ask_monitor') {
                        setChatData({ theme: 'line', title: '班長', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '班長，班費真的不是我拿的，你可以幫我跟婷婷他們說嗎？我現在被罵得很慘...' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '班長', text: '我知道了，我剛好在班群幫你說話，說事情還沒查清楚不要亂罵人。' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '班長', text: '結果...他們現在連我一起罵，說我包庇你，還把我踢出群組了...' });
                        await delay(2000);
                        if (!isCancelled) {
                            setEndingType('monitor_bullied');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'class_group_clarify') {
                        setChatData({ theme: 'line', title: '二年三班 官方群 (35)', bg: 'bg-[#8baecf]', isGroup: true, messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '各位，關於班費的事情是誤會，我真的沒有拿，有疑問我們可以請老師查走廊監視器。' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '阿浩', text: '笑死，走廊監視器壞了你當然敢這樣說。' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '婷婷', text: '小偷還敢講話啊，大家不要理他，孤立他！' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '系統', text: '你已被踢出群組', isSystem: true });
                        await delay(2000);
                        if (!isCancelled) setScene('dm_escalation');
                    }

                    else if (scene === 'dm_escalation') {
                        setUiView('chat');
                        setChatData({ theme: 'ig', title: '陌生訊息 (99+)', bg: 'bg-white', messages: [] });
                        const dms = ['去死一死好嗎小偷', '明天去學校走著瞧', '你活著就是在浪費空氣', '廢物'];
                        await delay(500);
                        for (let d of dms) {
                            if (isCancelled) return;
                            updateChat({ sender: 'other', senderName: '匿名', text: d, isAnon: true });
                            triggerShake(150);
                            await delay(1200);
                        }
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【事態升級】惡意蔓延到私訊，他們開始用各種難聽的字眼攻擊你...",
                                options: [
                                    { label: "截圖蒐證，立刻傳給老師求助", action: () => { setActiveChoice(null); setScene('report_school'); } },
                                    { label: "截圖傳給爸媽，尋求家人的保護", action: () => { setActiveChoice(null); setScene('report_parents'); } },
                                    { label: "氣死我了，直接用髒話對罵回去！", action: () => { setActiveChoice(null); setScene('dm_fight'); } },
                                    { label: "不敢回覆，直接退出畫面...", action: () => { setActiveChoice(null); setScene('forum_doxxing'); } }
                                ]
                            });
                        }
                    }

                    else if (scene === 'report_parents') {
                        setChatData({ theme: 'line', title: '媽媽', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '媽，學校同學在網路上造謠說我偷錢，還一直傳訊息罵我，我好害怕...' });
                        await delay(2500);
                        updateChat({ sender: 'other', senderName: '媽媽', text: '我早就跟你說過不要整天掛在網路上！你不去惹別人，別人會罵你嗎？' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '媽媽', text: '網路上的東西不要看就好了，自己惹麻煩！手機交出來，這禮拜都不准用！' });
                        await delay(3000);
                        if (!isCancelled) {
                            setEndingType('bad_parent_gap');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'dm_fight') {
                        updateChat({ sender: 'me', text: '你們到底有什麼毛病？一群神經病！' });
                        await delay(1500);
                        updateChat({ sender: 'me', text: '有種當面講啊，躲在螢幕後面算什麼英雄？凸' });
                        await delay(1500);
                        updateChat({ sender: 'other', senderName: '匿名', text: '哇塞破防了耶😂😂 截圖發論壇給大家看！', isAnon: true });
                        await delay(2000);
                        if (!isCancelled) setScene('forum_doxxing');
                    }

                    else if (scene === 'report_school') {
                        setChatData({ theme: 'line', title: '王老師 (導師)', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(500);
                        updateChat({ sender: 'me', text: '老師，同學們誤會我拿班費，現在一直在網路上攻擊我...(附上截圖)' });
                        await delay(2500);
                        updateChat({ sender: 'other', senderName: '王老師', text: '天啊！這太嚴重了。你做得很好，馬上截圖是對的。' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '王老師', text: '你現在安全嗎？我馬上聯絡學務處，明天我會親自調查這件事，你先不要理會他們！' });
                        await delay(3000);
                        if (!isCancelled) {
                            setEndingType('authority');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'forum_doxxing') {
                        setUiView('forum');
                        setForumPosts([]);
                        const posts = [
                            { text: '【爆卦】某高中二年級偷錢仔，真面目大公開！' },
                            { text: '肉搜出來了，本名XXX，家住桃園，國中就偷過東西了吧？' },
                            { text: '這種人就該社會性死亡，長那樣還敢出來作怪' },
                            { text: '幫高調，別讓他好過，明天去學校堵他！' }
                        ];
                        await delay(1000);
                        for (let p of posts) {
                            if (isCancelled) return;
                            setForumPosts(prev => [...prev, { id: Date.now()+Math.random(), ...p }]);
                            triggerShake(200);
                            await delay(1500);
                        }
                        if (!isCancelled) {
                            setActiveChoice({
                                title: "【最後防線】他們在匿名論壇公開了你的真實姓名與住址（肉搜），數千人正在看戲...",
                                options: [
                                    { label: "開分身帳號反肉搜造謠的婷婷，大家一起死！", action: () => { setActiveChoice(null); setScene('counter_doxxing'); } },
                                    { label: "假裝沒事，關掉手機，明天照常去上學", action: () => { setActiveChoice(null); setScene('school_confrontation'); } },
                                    { label: "傳訊息向最好的朋友小雅求救", action: () => { setActiveChoice(null); setScene('chat_help'); } },
                                    { label: "我受不了了，這一切太痛苦了...", action: () => { setActiveChoice(null); setScene('climax'); } }
                                ]
                            });
                        }
                    }

                    else if (scene === 'school_confrontation') {
                        setUiView('text');
                        setTextLines([]);
                        const lines = [
                            '隔天，你硬著頭皮走進教室...',
                            '原本吵鬧的班級瞬間安靜下來',
                            '所有人都在盯著你，竊竊私語',
                            '你走到座位旁，發現桌上被奇異筆寫滿了...',
                            '「小偷」、「去死」、「不要臉」',
                            '沒有人願意靠近你。'
                        ];
                        for (let l of lines) {
                            if (isCancelled) return;
                            setTextLines(prev => [...prev, l]);
                            await delay(2000);
                        }
                        await delay(2000);
                        if (!isCancelled) {
                            setEndingType('bad_real_world');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'counter_doxxing') {
                        setForumPosts(prev => [...prev, { id: 'c1', text: '【打臉】霸凌者真面目大公開！上面造謠的其實是2班的婷婷！', highlight: true }]);
                        await delay(2000);
                        setForumPosts(prev => [...prev, { id: 'c2', text: '哇靠反咬一口！原PO連對方家長在哪工作都貼出來了，血流成河！' }]);
                        triggerShake(500);
                        await delay(3000);
                        if (!isCancelled) {
                            setEndingType('mutual_destruction');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'chat_help') {
                        setUiView('chat');
                        setChatData({ theme: 'line', title: '小雅', bg: 'bg-[#8baecf]', messages: [] });
                        await delay(1000);
                        updateChat({ sender: 'me', text: '小雅，我好害怕，論壇上的人都在罵我，他們連我家地址都貼出來了...' });
                        await delay(2500);
                        updateChat({ sender: 'other', senderName: '小雅', text: '我看到了！你千萬不要看那些垃圾留言！' });
                        await delay(2000);
                        updateChat({ sender: 'other', senderName: '小雅', text: '不要怕，我現在去你家找你！我們一起把畫面存下來報警，你不是一個人！❤️' });
                        await delay(3000);
                        if (!isCancelled) {
                            setEndingType('good_late');
                            setScene('outro');
                        }
                    }

                    else if (scene === 'climax') {
                        setUiView('climax');
                    }
                };

                runScenario();
                return () => { isCancelled = true; };
            }, [scene]);

            // --- 浮動文字特效 (Climax) ---
            useEffect(() => {
                let interval;
                if (uiView === 'climax') {
                    const words = ['去死', '社會性死亡', '小偷', '肉搜', '廢物', '沒人相信你', '垃圾', '滾', '噁心', '假面'];
                    interval = setInterval(() => {
                        const word = document.createElement('div');
                        word.className = 'floating-word';
                        word.innerText = words[Math.floor(Math.random() * words.length)];
                        word.style.left = `${Math.random() * 80}%`;
                        word.style.fontSize = `${Math.random() * 2 + 1}rem`;
                        word.style.animationDuration = `${Math.random() * 2 + 2}s`;
                        
                        const container = document.getElementById('climax-container');
                        if (container) container.appendChild(word);
                        setTimeout(() => word.remove(), 4000);
                    }, 200);
                    
                    setTimeout(() => {
                        clearInterval(interval);
                        setEndingType('bad_climax');
                        setScene('outro');
                    }, 6000);
                }
                return () => clearInterval(interval);
            }, [uiView]);

            const resetSimulation = () => {
                setScene('intro');
                setUiView('none');
                setActiveChoice(null);
                setEndingType('none');
            };

            // --- UI 渲染區塊 ---
            const renderChoiceOverlay = () => {
                if (!activeChoice) return null;
                return (
                    <div className="absolute inset-0 bg-black/80 z-40 flex flex-col items-center justify-end p-6 animate-fade-in backdrop-blur-md">
                        <div className="w-full max-w-sm mb-4">
                            <h3 className="text-xl font-bold text-white mb-6 leading-relaxed shadow-sm p-4 bg-gray-900/80 rounded-2xl border border-gray-700">{activeChoice.title}</h3>
                            <div className="space-y-3">
                                {activeChoice.options.map((opt, idx) => (
                                    <button
                                        key={idx}
                                        onClick={opt.action}
                                        className="w-full py-4 px-5 rounded-2xl text-left font-medium transition-all transform active:scale-95 bg-white text-gray-800 hover:bg-gray-200 border border-gray-300 shadow-sm"
                                    >
                                        {opt.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderIntro = () => (
                <div className="h-full bg-gradient-to-b from-slate-900 to-black text-white flex flex-col items-center justify-center p-8 text-center relative overflow-hidden">
                    <div className="absolute top-10 left-10 opacity-10"><Icons.MessageCircle className="w-24 h-24" /></div>
                    <div className="absolute bottom-20 right-10 opacity-10"><Icons.AlertOctagon className="w-32 h-32" /></div>
                    
                    <Icons.Smartphone className="w-20 h-20 mb-6 text-slate-300 animate-pulse" />
                    <h1 className="text-3xl font-black mb-4 tracking-wider">網路霸凌<br/>多重結局體驗</h1>
                    <p className="text-gray-400 mb-8 leading-relaxed text-sm">
                        這是一場第一人稱的心理模擬實驗。<br/>
                        沒有顏色提示，沒有絕對正確的解答。<br/>
                        你的每一個「選擇」，都會將故事導向完全不同的結局。<br/><br/>
                        <span className="text-xs text-red-400">※ 內容包含負面詞彙與精神壓迫，請斟酌體驗。</span>
                    </p>
                    <button 
                        onClick={() => setScene('feed')}
                        className="bg-white text-black px-8 py-4 rounded-full font-bold text-lg transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(255,255,255,0.3)]"
                    >
                        開啟手機
                    </button>
                </div>
            );

            const renderFeed = () => (
                <div className="h-full bg-gray-50 flex flex-col">
                    <div className="bg-white p-4 border-b flex items-center justify-between sticky top-0 z-10 shadow-sm">
                        <span className="font-bold text-lg">Instagram</span>
                        <Icons.Heart className="w-6 h-6 text-gray-800" />
                    </div>
                    <div className="p-4 flex-1 overflow-y-auto pb-32">
                        <div className="bg-white rounded-2xl shadow-sm border p-4 mb-4">
                            <div className="flex items-center gap-3 mb-3">
                                <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-yellow-400 to-pink-500 p-0.5">
                                    <div className="w-full h-full bg-white rounded-full border-2 border-white"></div>
                                </div>
                                <span className="font-bold">你的帳號</span>
                            </div>
                            <div className="w-full h-48 bg-gray-200 rounded-lg mb-3 flex items-center justify-center text-gray-400">
                                [生活照片]
                            </div>
                            <p className="text-sm mb-4 text-gray-700">今天天氣真好！跟朋友出門逛街😊</p>
                            
                            <div className="space-y-3 border-t pt-3">
                                {feedComments.map((c) => (
                                    <div key={c.id} className="text-sm animate-fade-in-left">
                                        <span className={c.isUser ? "font-bold text-blue-600 mr-2" : "font-bold mr-2 text-gray-900"}>{c.user}</span>
                                        <span className={c.isUser ? "text-blue-800" : "text-gray-700"}>{c.text}</span>
                                    </div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderChat = () => {
                const isLine = chatData.theme === 'line';
                const headerBg = isLine ? 'bg-[#212b36]' : 'bg-white';
                const headerText = isLine ? 'text-white' : 'text-gray-900';
                const iconColor = isLine ? 'text-white' : 'text-gray-500';
                
                return (
                    <div className={`h-full ${chatData.bg || 'bg-white'} flex flex-col relative`}>
                        {scene === 'dm_fight' && <div className="screen-flash" />}
                        <div className={`${headerBg} p-4 flex items-center gap-3 sticky top-0 z-10 shadow-sm`}>
                            <Icons.ChevronLeft className={`w-6 h-6 ${iconColor}`} />
                            <div className="flex flex-col">
                                <span className={`font-bold text-lg ${headerText}`}>{chatData.title}</span>
                                {chatData.isGroup && <span className="text-xs text-gray-400 flex items-center gap-1"><Icons.Users className="w-3 h-3"/> 群組成員</span>}
                            </div>
                        </div>
                        <div className="flex-1 p-4 overflow-y-auto space-y-4 pb-32">
                            {chatData.messages.map((msg) => {
                                if (msg.isSystem) {
                                    return <div key={msg.id} className="text-center text-xs text-gray-500 my-2 animate-fade-in">{msg.text}</div>;
                                }
                                const isMe = msg.sender === 'me';
                                return (
                                    <div key={msg.id} className={`flex gap-2 animate-fade-in-left ${isMe ? 'flex-row-reverse animate-fade-in' : ''}`}>
                                        {!isMe && (
                                            <div className="w-8 h-8 rounded-full bg-slate-700 flex-shrink-0 flex items-center justify-center text-white text-xs overflow-hidden">
                                                {msg.isAnon ? '匿' : (msg.senderName ? msg.senderName[0] : 'U')}
                                            </div>
                                        )}
                                        <div className="flex flex-col max-w-[75%]">
                                            {!isMe && msg.senderName && !msg.isAnon && <span className={`text-[10px] mb-1 ${isLine ? 'text-slate-700' : 'text-gray-500'}`}>{msg.senderName}</span>}
                                            <div className={`p-3 rounded-2xl shadow-sm text-sm ${isMe ? (isLine ? 'bg-[#85e04c] text-black rounded-tr-none' : 'bg-blue-500 text-white rounded-tr-none') : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={messagesEndRef} />
                        </div>
                    </div>
                );
            };

            const renderForum = () => (
                <div className="h-full bg-gray-100 flex flex-col relative">
                    <div className="bg-[#003C9D] p-4 text-white flex items-center justify-between sticky top-0 z-10">
                        <span className="font-bold text-lg tracking-widest">匿名論壇</span>
                        <Icons.Search className="w-5 h-5" />
                    </div>
                    <div className="flex-1 p-2 overflow-y-auto pb-32">
                        {forumPosts.map((post) => (
                            <div key={post.id} className={`bg-white p-4 mb-2 shadow-sm rounded-lg animate-fade-in-left ${post.highlight ? 'border-l-4 border-red-500 bg-red-50' : ''}`}>
                                <div className="flex gap-2 text-xs text-gray-500 mb-2">
                                    <span className={post.highlight ? "text-red-500 font-bold" : "text-[#0066CC] font-bold"}>{post.highlight ? '你 (原PO)' : '匿名網友'}</span>
                                    <span>• 剛剛</span>
                                </div>
                                <p className={`text-sm ${post.highlight ? 'font-bold text-red-700' : 'text-gray-800'}`}>{post.text}</p>
                            </div>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                </div>
            );

            const renderTextScene = () => (
                <div className="h-full bg-black flex flex-col items-center justify-center p-8">
                    <div className="w-full space-y-8">
                        {textLines.map((line, idx) => (
                            <p key={idx} className="text-gray-300 text-center animate-fade-in text-lg" style={{ textShadow: '0 2px 4px rgba(0,0,0,0.8)' }}>
                                {line}
                            </p>
                        ))}
                        <div ref={messagesEndRef} />
                    </div>
                </div>
            );

            const renderClimax = () => (
                <div id="climax-container" className="h-full bg-black relative overflow-hidden">
                    <div className="absolute inset-0 flex items-center justify-center z-50 animate-fade-in" style={{ animationDelay: '3s' }}>
                        <div className="w-full h-full bg-black/90 flex flex-col items-center justify-center">
                            <Icons.WifiOff className="w-16 h-16 text-red-600 mb-4 animate-pulse" />
                            <h2 className="text-white text-3xl font-bold mb-2 tracking-widest">系統崩潰</h2>
                            <p className="text-gray-500">精神壓力已達極限</p>
                        </div>
                    </div>
                </div>
            );

            const renderOutro = () => {
                let config = {};
                switch(endingType) {
                    case 'good_early':
                        config = {
                            title: "結局：及時止損", icon: <Icons.ShieldCheck className="w-10 h-10" />, color: "bg-blue-100 text-blue-700",
                            desc: "在惡意剛開始蔓延時，你選擇了「不理會並封鎖」。這成功切斷了霸凌者的樂趣，將傷害降到最低。",
                            takeaway: "【不隨之起舞】是初期的最佳防禦。惡意留言者渴望看到你的崩潰，無視就是最好的反擊。"
                        }; break;
                    case 'monitor_bullied':
                        config = {
                            title: "結局：波及無辜", icon: <Icons.Users className="w-10 h-10" />, color: "bg-yellow-100 text-yellow-700",
                            desc: "班長試圖幫你說話，卻連帶成為了被攻擊的目標。看著無辜的人因為自己被霸凌，你的內心充滿了無法言喻的愧疚與痛苦。",
                            takeaway: "【霸凌者的怒火是盲目的】。面對群體暴走，單靠同儕的力量往往不足以抵抗，需要更專業的大人或機制來介入。"
                        }; break;
                    case 'bad_parent_gap':
                        config = {
                            title: "結局：二度傷害", icon: <Icons.UserX className="w-10 h-10" />, color: "bg-purple-100 text-purple-700",
                            desc: "你鼓起勇氣向家人求助，卻換來責備與不解。有時候，親近之人的不理解，比網路上的酸言酸語更讓人絕望。",
                            takeaway: "【求助對象的選擇很重要】。如果家人暫時無法理解，請尋求學校輔導老師、反霸凌專線 (1953) 等專業管道的協助。"
                        }; break;
                    case 'mutual_destruction':
                        config = {
                            title: "結局：反噬的烈火", icon: <Icons.Swords className="w-10 h-10" />, color: "bg-orange-100 text-orange-700",
                            desc: "你選擇以暴制暴，互相肉搜對方。最終雙方都面臨學校記過與法律訴訟。你雖然反擊了，但也變成了自己曾經討厭的那種人。",
                            takeaway: "【以暴制暴沒有贏家】。在網路上留下互相攻擊的字眼，反而可能讓你在法律上失去站得住腳的立場。"
                        }; break;
                    case 'authority':
                        config = {
                            title: "結局：體制的保護傘", icon: <Icons.Landmark className="w-10 h-10" />, color: "bg-green-100 text-green-700",
                            desc: "你冷靜地截圖，並立刻尋求老師的協助。透過校方介入與調查監視器，真相大白，造謠者受到了應有的懲罰。",
                            takeaway: "【冷靜蒐證，向上通報】是最有效的止血方法。將對話截圖，讓有能力的大人來介入處理。"
                        }; break;
                    case 'good_late':
                        config = {
                            title: "結局：溫暖的光", icon: <Icons.HeartHandshake className="w-10 h-10" />, color: "bg-teal-100 text-teal-700",
                            desc: "在面對匿名論壇鋪天蓋地的造謠時，你勇敢地向信任的朋友求救，在陪伴下走出了陰霾並報警處理。",
                            takeaway: "【尋求同儕協助】是終結孤立感的關鍵。當事態升級時，告訴身邊信任的人，你永遠不是一個人。"
                        }; break;
                    case 'bad_real_world':
                        config = {
                            title: "結局：虛實交錯的惡意", icon: <Icons.UserX className="w-10 h-10" />, color: "bg-gray-200 text-gray-800",
                            desc: "你以為不看手機就能逃避，但網路的惡意早已蔓延到現實生活。孤立無援的你，成為了全班霸凌的對象。",
                            takeaway: "【網路霸凌絕非只在網路上】。當造謠與攻擊發生時，必須及時澄清或尋求具權威的大人介入，忽視只會讓事態在現實中發酵。"
                        }; break;
                    case 'bad_climax':
                    default:
                        config = {
                            title: "結局：深淵吞噬", icon: <Icons.Skull className="w-10 h-10" />, color: "bg-red-100 text-red-700",
                            desc: "大量的惡意訊息與公審徹底擊潰了你的心理防線。這正是許多網路霸凌受害者最終面臨的絕望處境。",
                            takeaway: "螢幕後的文字，能成為殺人的利刃。在按送出鍵之前，請永遠記得：網路的另一端，是一個活生生的人。"
                        }; break;
                }

                return (
                    <div className="h-full bg-slate-50 flex flex-col items-center justify-center p-6 text-center animate-fade-in overflow-y-auto">
                        <div className={`w-24 h-24 rounded-full flex items-center justify-center mb-6 shadow-xl border-4 border-white ${config.color}`}>
                            {config.icon}
                        </div>
                        <h2 className={`text-2xl font-black mb-6 ${config.color.split(' ')[1]}`}>{config.title}</h2>
                        <div className="bg-white p-6 rounded-3xl shadow-md mb-8 border border-gray-100 w-full">
                            <p className="text-gray-700 mb-6 leading-relaxed text-left font-medium">{config.desc}</p>
                            <div className="h-px bg-gray-200 w-full mb-6"></div>
                            <h4 className="font-bold text-gray-900 mb-3 text-left flex items-center gap-2">
                                <span className="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs">💡 解析</span>
                                核心反思
                            </h4>
                            <p className="text-gray-600 text-sm leading-relaxed text-left">{config.takeaway}</p>
                        </div>
                        <button onClick={resetSimulation} className="bg-slate-900 hover:bg-black text-white px-8 py-4 rounded-full font-bold transition-colors w-full flex items-center justify-center gap-2 shadow-lg">
                            <Icons.RotateCcw className="w-5 h-5" /> 重新體驗不同選擇
                        </button>
                    </div>
                );
            };

            return (
                <div className={`phone-container ${isShaking ? 'animate-shake' : ''}`}>
                    {scene !== 'intro' && scene !== 'outro' && uiView !== 'climax' && uiView !== 'text' && (
                        <div className="absolute top-0 w-full h-6 bg-black/20 z-50 flex justify-between items-center px-4 text-[10px] text-white backdrop-blur-sm pointer-events-none">
                            <span className="font-medium tracking-wider">14:30</span>
                            <div className="flex gap-1.5"><Icons.Wifi className="w-3 h-3"/><Icons.Battery className="w-3 h-3"/></div>
                        </div>
                    )}
                    
                    {renderChoiceOverlay()}
                    
                    <div className="h-full relative z-0">
                        {scene === 'intro' && renderIntro()}
                        {uiView === 'feed' && renderFeed()}
                        {uiView === 'chat' && renderChat()}
                        {uiView === 'forum' && renderForum()}
                        {uiView === 'text' && renderTextScene()}
                        {uiView === 'climax' && renderClimax()}
                        {scene === 'outro' && renderOutro()}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CyberbullyingSim />);
    </script>
</body>
</html>
