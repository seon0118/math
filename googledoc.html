                title: '下載與匯出',
                content: `

        let currentTopicId = 'intro';

        // Initialize Application
        function init() {
            renderSidebar();
            renderContent(currentTopicId);
            lucide.createIcons();

            // Mobile menu listeners
            document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);
            document.getElementById('sidebar-overlay').addEventListener('click', toggleMobileMenu);

            // Simulator listeners
            document.addEventListener('change', function(e) {
                if(e.target && e.target.id === 'sim-font'){
                    document.getElementById('sim-text').style.fontFamily = e.target.value;
                }
            });
        }

        // Render Sidebar Navigation
        function renderSidebar() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';
            
            guideData.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-6 py-3 flex items-center gap-3 transition-colors ${
                    topic.id === currentTopicId 
                    ? 'bg-blue-50 text-blue-700 border-r-4 border-blue-600 font-medium' 
                    : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                }`;
                btn.onclick = () => selectTopic(topic.id);
                
                btn.innerHTML = `
                    <i data-lucide="${topic.icon}" class="w-5 h-5 ${topic.id === currentTopicId ? 'text-blue-600' : 'text-gray-400'}"></i>
                    ${topic.title}
                `;
                navMenu.appendChild(btn);
            });
            lucide.createIcons();
        }

        // Handle Topic Selection
        function selectTopic(id) {
            currentTopicId = id;
            renderSidebar();
            renderContent(id);
            
            // Close mobile menu if open
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full')) {
                toggleMobileMenu();
            }

            // Scroll to top
            document.querySelector('main').scrollTop = 0;
        }

        // Render Main Content
        function renderContent(id) {
            const topic = guideData.find(t => t.id === id);
            if (topic) {
                const contentArea = document.getElementById('content-area');
                // clear first to re-trigger animation
                contentArea.innerHTML = ''; 
                setTimeout(() => {
                    contentArea.innerHTML = topic.content;
                    lucide.createIcons();
                }, 10);
            }
        }

        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- Simulator Functions ---

        // Text Formatting Simulator
        let formatState = { bold: false, italic: false, underline: false };
        
        function toggleFormat(type) {
            const textEl = document.getElementById('sim-text');
            const btnEl = document.getElementById(`btn-${type}`);
            
            formatState[type] = !formatState[type];
            
            if (type === 'bold') {
                textEl.style.fontWeight = formatState.bold ? 'bold' : 'normal';
            } else if (type === 'italic') {
                textEl.style.fontStyle = formatState.italic ? 'italic' : 'normal';
            } else if (type === 'underline') {
                textEl.style.textDecoration = formatState.underline ? 'underline' : 'none';
            }

            if (formatState[type]) {
                btnEl.classList.add('bg-blue-100', 'text-blue-700');
                btnEl.classList.remove('text-gray-700', 'hover:bg-gray-200');
            } else {
                btnEl.classList.remove('bg-blue-100', 'text-blue-700');
                btnEl.classList.add('text-gray-700', 'hover:bg-gray-200');
            }
        }

        function setAlignment(align) {
            document.getElementById('sim-text').style.textAlign = align;
        }

        function changeColor(color) {
            document.getElementById('sim-text').style.color = color;
        }

        // Share Modal Simulator
        function openShareModal() {
            const modal = document.getElementById('share-modal');
            if(modal) modal.classList.remove('hidden');
        }

        function closeShareModal() {
            const modal = document.getElementById('share-modal');
            if(modal) modal.classList.add('hidden');
        }

        // Run init on load
        window.addEventListener('DOMContentLoaded', init);

    </script>
