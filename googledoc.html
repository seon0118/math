    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .cert-font {
            font-family: 'Noto Serif TC', serif;
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* Quiz radio custom styling */
        .quiz-option input:checked + div {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .quiz-option input:checked + div .radio-inner {
            background-color: #3b82f6;
        }
    </style>

                                    </div>
                                    <p class="text-lg text-gray-600 max-w-lg mx-auto leading-relaxed">
                                        已成功完成「Google 文件基本操作指引」之線上課程，並於隨堂評量中取得 <span id="cert-score" class="font-bold text-blue-700 text-2xl"></span> 分之優異成績，特發此證以茲鼓勵。
                                    </p>
                                </div>
                                
                                <div class="flex justify-between items-end px-16 mt-8">
                                    <div class="text-left">
                                        <p class="text-sm text-gray-500 mb-1">Date / 日期</p>
                                        <p class="font-bold border-t border-gray-300 pt-2 w-32" id="cert-date"></p>
                                    </div>
                                    <div class="text-right">
                                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=DocsCertified" class="inline-block opacity-80" alt="QR Code">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        let currentTopicId = 'intro';

        // --- Initialization ---
        function init() {
            lucide.createIcons();
            
            // Handle Login Form
            document.getElementById('student-form').addEventListener('submit', function(e) {
                e.preventDefault();
                studentInfo.className = document.getElementById('input-class').value;
                studentInfo.seatNumber = document.getElementById('input-number').value;
                studentInfo.name = document.getElementById('input-name').value;
                
                // Update UI with student info
                document.getElementById('display-class').textContent = `${studentInfo.className} - ${studentInfo.seatNumber}號`;
                document.getElementById('display-name').textContent = studentInfo.name;
                
                // Hide login screen
                const loginScreen = document.getElementById('login-screen');
                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    // Render app content
                    renderSidebar();
                    renderContent('intro');
                }, 500);
            });

            // Mobile menu listeners
            document.getElementById('mobile-menu-btn').addEventListener('click', toggleMobileMenu);
            document.getElementById('sidebar-overlay').addEventListener('click', toggleMobileMenu);
        }

        // --- Navigation & Rendering ---
        function renderSidebar() {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';
            
            guideData.forEach(topic => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-6 py-3 flex items-center gap-3 transition-colors ${
                    topic.id === currentTopicId 
                    ? 'bg-blue-50 text-blue-700 border-r-4 border-blue-600 font-bold' 
                    : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                }`;
                btn.onclick = () => selectTopic(topic.id);
                
                btn.innerHTML = `
                    <i data-lucide="${topic.icon}" class="w-5 h-5 ${topic.id === currentTopicId ? 'text-blue-600' : 'text-gray-400'}"></i>
                    ${topic.title}
                `;
                navMenu.appendChild(btn);
            });
            lucide.createIcons();
        }

        function selectTopic(id) {
            currentTopicId = id;
            renderSidebar();
            renderContent(id);
            
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full')) {
                toggleMobileMenu();
            }
            document.querySelector('main').scrollTop = 0;
        }

        function renderContent(id) {
            const topic = guideData.find(t => t.id === id);
            if (topic) {
                const contentArea = document.getElementById('content-area');
                contentArea.innerHTML = ''; 
                setTimeout(() => {
                    contentArea.innerHTML = topic.content;
                    
                    // Special injections based on topic
                    if (id === 'intro' && document.getElementById('welcome-name')) {
                        document.getElementById('welcome-name').textContent = studentInfo.name;
                    }
                    if (id === 'quiz') {
                        renderQuizForm();
                    }
                    
                    lucide.createIcons();
                }, 10);
            }
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // --- Quiz Logic ---
        function renderQuizForm() {
            const form = document.getElementById('quiz-form');
            form.innerHTML = '';
            
            quizQuestions.forEach((q, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-white p-6 rounded-xl shadow-sm border border-gray-100';
                
                let optionsHtml = '';
                q.options.forEach((opt, oIndex) => {
                    optionsHtml += `
                        <label class="quiz-option cursor-pointer block mt-3">
                            <input type="radio" name="q${qIndex}" value="${oIndex}" class="peer sr-only" required>
                            <div class="flex items-center p-4 border border-gray-200 rounded-lg transition-all hover:bg-gray-50">
                                <div class="w-5 h-5 rounded-full border border-gray-300 mr-3 flex items-center justify-center">
                                    <div class="radio-inner w-2.5 h-2.5 rounded-full bg-transparent transition-colors"></div>
                                </div>
                                <span class="text-gray-700">${opt}</span>
                            </div>
                        </label>
                    `;
                });

                qDiv.innerHTML = `
                    <h3 class="font-bold text-lg text-gray-800 mb-4 flex gap-2">
                        <span class="text-blue-600 bg-blue-50 px-2 rounded h-fit">Q${qIndex + 1}</span> 
                        <span>${q.q}</span>
                    </h3>
                    <div>${optionsHtml}</div>
                `;
                form.appendChild(qDiv);
            });

            // Add submit button
            form.innerHTML += `
                <div class="text-center pt-4">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-full transition-colors shadow-md text-lg">
                        <i data-lucide="send" class="w-5 h-5 inline-block mr-2 pb-0.5"></i>交卷看成績
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function submitQuiz(e) {
            e.preventDefault();
            
            // Calculate Score
            let correctCount = 0;
            const formData = new FormData(e.target);
            
            quizQuestions.forEach((q, index) => {
                const userAnswer = parseInt(formData.get(`q${index}`));
                if (userAnswer === q.answer) {
                    correctCount++;
                }
            });

            const score = (correctCount / quizQuestions.length) * 100;
            const passed = score >= 80;

            // Hide Quiz, Show Results
            document.getElementById('quiz-container').classList.add('hidden');
            const resultContainer = document.getElementById('result-container');
            resultContainer.classList.remove('hidden');

            // Update Result UI
            const scoreCircle = document.getElementById('score-circle');
            scoreCircle.textContent = score;
            
            const resultTitle = document.getElementById('result-title');
            const resultMsg = document.getElementById('result-msg');
            const certActions = document.getElementById('cert-actions');
            const retryAction = document.getElementById('retry-action');

            if (passed) {
                scoreCircle.className = "w-32 h-32 mx-auto rounded-full flex items-center justify-center text-5xl font-bold text-white mb-6 shadow-lg bg-green-500 shadow-green-200";
                resultTitle.textContent = "恭喜通過！";
                resultTitle.className = "text-3xl font-bold text-green-600 mb-2";
                resultMsg.textContent = `太棒了 ${studentInfo.name} 同學！您展現了對 Google 文件的熟悉度，請領取您的專屬結業證書。`;
                certActions.classList.remove('hidden');
                retryAction.classList.add('hidden');
                
                // Prepare Certificate Data
                prepareCertificate(score);
            } else {
                scoreCircle.className = "w-32 h-32 mx-auto rounded-full flex items-center justify-center text-5xl font-bold text-white mb-6 shadow-lg bg-red-500 shadow-red-200";
                resultTitle.textContent = "再接再厲！";
                resultTitle.className = "text-3xl font-bold text-red-600 mb-2";
                resultMsg.textContent = `很可惜，您只答對了 ${correctCount} 題，未達 80 分標準。請複習前面的章節後再試一次！`;
                certActions.classList.add('hidden');
                retryAction.classList.remove('hidden');
            }
            
            // Scroll to top
            document.querySelector('main').scrollTop = 0;
        }

        function resetQuiz() {
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('quiz-form').reset();
            document.querySelector('main').scrollTop = 0;
        }

        // --- Certificate Generation ---
        function prepareCertificate(score) {
            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            document.getElementById('cert-class').textContent = `${studentInfo.className} (${studentInfo.seatNumber}號)`;
            document.getElementById('cert-name').textContent = studentInfo.name;
            document.getElementById('cert-score').textContent = score;
            document.getElementById('cert-date').textContent = dateStr;
        }

        function showCertificatePreview() {
            const certDiv = document.getElementById('certificate-template');
            certDiv.classList.remove('hidden');
            // Scroll to cert
            certDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function generatePDF() {
            // Temporarily show the template for html2pdf to capture
            const element = document.getElementById('certificate-template');
            element.classList.remove('hidden');
            
            // Use the inner div as the target for PDF (the 800x600 container)
            const targetElement = element.firstElementChild;

            const opt = {
                margin:       0,
                filename:     `Google文件證書_${studentInfo.className}_${studentInfo.name}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'px', format: [800, 600], orientation: 'landscape' }
            };

            // Generate and save
            html2pdf().set(opt).from(targetElement).save().then(() => {
                // Re-hide if it was meant to be hidden (unless user clicked preview first)
                // For simplicity, we leave it visible after download so they can see what downloaded.
            });
        }

        // Run init on load
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
