<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幾何之森：角度探索</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel (JSX 編譯) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 隱藏滾動條但保留滾動功能 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 確保字體平滑與動畫基礎 */
    body { -webkit-font-smoothing: antialiased; }
    .animate-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-spin-slow { animation: spin 10s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#e8f1e3]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useMemo, useEffect } = React;

    // --- SVG Icons (取代 Lucide) ---
    const Icon = ({ paths, size=24, className="", fill="none" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{__html: paths}} />
    );

    const icons = {
      Triangle: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>',
      Circle: '<circle cx="12" cy="12" r="10"/>',
      GitMerge: '<circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/>',
      ClipboardList: '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
      CheckCircle2: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
      XCircle: '<circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>',
      ArrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
      Heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
      Leaf: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>',
      Map: '<polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/>',
      TreePine: '<path d="m17 14 3 3.33"/><path d="M14 9.33 17 14"/><path d="m11 4.66 3 4.67"/><path d="m13 4.66-3 4.67"/><path d="M10 9.33 7 14"/><path d="m7 14-3 3.33"/><path d="M12 22v-9.33"/>',
      Play: '<polygon points="5 3 19 12 5 21 5 3"/>',
      RotateCcw: '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
      Hexagon: '<polygon points="21 16 12 21 3 16 3 8 12 3 21 8 21 16"/>'
    };

    // --- Math & SVG Helper Functions ---
    function generateArcPath(cx, cy, radius, startAngle, endAngle) {
      let path = `M ${cx} ${cy} `;
      while (endAngle < startAngle) endAngle += 360;
      const steps = Math.max(10, Math.ceil((endAngle - startAngle) / 5));
      for (let i = 0; i <= steps; i++) {
        const a = startAngle + (endAngle - startAngle) * (i / steps);
        const rad = (a * Math.PI) / 180;
        const x = cx + radius * Math.cos(rad);
        const y = cy - radius * Math.sin(rad); 
        path += `L ${x} ${y} `;
      }
      path += 'Z';
      return path;
    }

    function drawWedge(cx, cy, radius, a1, a2) {
      let diff = a2 - a1;
      while(diff <= -180) diff += 360;
      while(diff > 180) diff -= 360;
      if (diff > 0) return generateArcPath(cx, cy, radius, a1, a1 + diff);
      else return generateArcPath(cx, cy, radius, a1 + diff, a1);
    }

    function getInteriorArcWithCenter(cx, cy, prev, curr, next, radius) {
      const dx1 = prev.x - curr.x, dy1 = prev.y - curr.y;
      const dx2 = next.x - curr.x, dy2 = next.y - curr.y;
      let a1 = Math.atan2(-dy1, dx1) * 180 / Math.PI;
      let a2 = Math.atan2(-dy2, dx2) * 180 / Math.PI;
      return drawWedge(cx, cy, radius, a1, a2);
    }

    function getExteriorArcWithCenter(cx, cy, prev, curr, next, radius) {
      const dx1 = curr.x - prev.x, dy1 = curr.y - prev.y;
      const dx2 = next.x - curr.x, dy2 = next.y - curr.y;
      let a1 = Math.atan2(-dy1, dx1) * 180 / Math.PI;
      let a2 = Math.atan2(-dy2, dx2) * 180 / Math.PI;
      return drawWedge(cx, cy, radius, a1, a2);
    }

    const getDist = (p1, p2) => Math.hypot(p2.x - p1.x, p2.y - p1.y);

    const ghibliColors = {
      blue: "#5a82a0", orange: "#d98a59", red: "#c16565", green: "#6b8e6b", line: "#5c432a", bg: "#fffdf7", 
    };

    // --- Components ---

    // 1. 互餘與互補角
    const CompSuppView = () => {
      const [mode, setMode] = useState('comp'); 
      const [angle, setAngle] = useState(45);
      const svgRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);

      const cx = 200, cy = 250;
      const maxAngle = mode === 'comp' ? 90 : 180;

      const handlePointerDown = (e) => { e.target.setPointerCapture(e.pointerId); setIsDragging(true); updateAngle(e); };
      const handlePointerMove = (e) => { if (!isDragging) return; updateAngle(e); };
      const handlePointerUp = (e) => { e.target.releasePointerCapture(e.pointerId); setIsDragging(false); };

      const updateAngle = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const dx = (e.clientX - rect.left) - cx, dy = cy - (e.clientY - rect.top); 
        let a = (Math.atan2(dy, dx) * 180) / Math.PI;
        if (a < 0) a += 360;
        if (a > maxAngle && a < 270) a = maxAngle;
        if (a >= 270) a = 0;
        setAngle(Math.round(a));
      };

      const handleX = cx + 150 * Math.cos((angle * Math.PI) / 180);
      const handleY = cy - 150 * Math.sin((angle * Math.PI) / 180);
      const t1X = cx + 80 * Math.cos(((angle / 2) * Math.PI) / 180);
      const t1Y = cy - 80 * Math.sin(((angle / 2) * Math.PI) / 180);
      const t2X = cx + 70 * Math.cos((((angle + maxAngle) / 2) * Math.PI) / 180);
      const t2Y = cy - 70 * Math.sin((((angle + maxAngle) / 2) * Math.PI) / 180);

      return (
        <div className="flex flex-col md:flex-row gap-6 items-start">
          <div className="flex-1 w-full flex flex-col gap-4">
            <div className="flex gap-3">
              <button onClick={() => { setMode('comp'); setAngle(Math.min(angle, 90)); }} className={`px-5 py-2 rounded-xl font-bold transition-all border-b-4 ${mode === 'comp' ? 'bg-[#6b8e6b] text-white border-[#4b6b4b] translate-y-1 border-b-0' : 'bg-[#e3dec8] text-[#5c432a] border-[#c4ba9f] hover:bg-[#d8cfb3]'}`}>互餘 (兩角和 90°)</button>
              <button onClick={() => { setMode('supp'); }} className={`px-5 py-2 rounded-xl font-bold transition-all border-b-4 ${mode === 'supp' ? 'bg-[#6b8e6b] text-white border-[#4b6b4b] translate-y-1 border-b-0' : 'bg-[#e3dec8] text-[#5c432a] border-[#c4ba9f] hover:bg-[#d8cfb3]'}`}>互補 (兩角和 180°)</button>
            </div>
            <div className="bg-[#f0ece1] rounded-2xl overflow-hidden relative touch-none shadow-inner border-2 border-[#d6cfb8] w-full" style={{ height: '350px' }}>
              <svg ref={svgRef} className="w-full h-full cursor-crosshair" onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
                <line x1={cx} y1={cy} x2={cx + 150} y2={cy} stroke={ghibliColors.line} strokeWidth="4" strokeLinecap="round" />
                <line x1={cx} y1={cy} x2={cx + 150 * Math.cos((maxAngle * Math.PI) / 180)} y2={cy - 150 * Math.sin((maxAngle * Math.PI) / 180)} stroke={ghibliColors.line} strokeWidth="4" strokeLinecap="round" />
                {angle > 0 && <path d={generateArcPath(cx, cy, 60, 0, angle)} fill={ghibliColors.blue} fillOpacity="0.5" />}
                {angle < maxAngle && <path d={generateArcPath(cx, cy, 50, angle, maxAngle)} fill={ghibliColors.orange} fillOpacity="0.5" />}
                {angle > 10 && <text x={t1X} y={t1Y} textAnchor="middle" dominantBaseline="middle" fill="#2d4252" fontWeight="bold" fontSize="16">∠1</text>}
                {maxAngle - angle > 10 && <text x={t2X} y={t2Y} textAnchor="middle" dominantBaseline="middle" fill="#753e1c" fontWeight="bold" fontSize="16">∠2</text>}
                <line x1={cx} y1={cy} x2={handleX} y2={handleY} stroke={ghibliColors.line} strokeWidth="4" strokeDasharray="6 6" />
                <circle cx={handleX} cy={handleY} r="14" fill="#fffdf7" stroke={ghibliColors.line} strokeWidth="4" className="cursor-grab hover:scale-110 transition-transform" />
                <circle cx={cx} cy={cy} r="6" fill={ghibliColors.line} />
                <text x={cx} y={cy + 40} textAnchor="middle" fill="#8a7b66" className="text-sm font-medium">拖曳虛線上的圓點改變角度</text>
              </svg>
            </div>
          </div>
          <div className="md:w-72 bg-[#fffdf7] border-2 border-[#d6cfb8] rounded-2xl p-6 shadow-md flex flex-col gap-4">
            <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Leaf} size={20} className="text-[#6b8e6b]" />角度計算</h3>
            <div className="flex justify-between items-center text-lg"><span className="flex items-center gap-2"><span className="w-4 h-4 rounded-full bg-[#5a82a0] inline-block shadow-sm"></span> 藍色角 (∠1)</span><span className="font-bold text-[#3d5e75]">{angle}°</span></div>
            <div className="flex justify-between items-center text-lg"><span className="flex items-center gap-2"><span className="w-4 h-4 rounded-full bg-[#d98a59] inline-block shadow-sm"></span> 橘色角 (∠2)</span><span className="font-bold text-[#9e5b30]">{maxAngle - angle}°</span></div>
            <div className="mt-4 pt-4 border-t-2 border-[#e3dec8]">
              <div className="text-sm text-[#8a7b66] mb-1">自然法則：</div>
              <div className="text-2xl font-bold text-center text-[#5c432a]">{angle}° + {maxAngle - angle}° = {maxAngle}°</div>
              <div className="text-center mt-3 font-bold text-[#4b6b4b] bg-[#e8f1e3] p-3 rounded-xl border border-[#c5dec0]">{mode === 'comp' ? '∠1 + ∠2 = 90° (互餘)' : '∠1 + ∠2 = 180° (互補)'}</div>
            </div>
          </div>
        </div>
      );
    };

    // 2. 對頂角
    const VerticalAnglesView = () => {
      const [angle, setAngle] = useState(30);
      const svgRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);
      const cx = 200, cy = 200;

      const handlePointerDown = (e) => { e.target.setPointerCapture(e.pointerId); setIsDragging(true); updateAngle(e); };
      const handlePointerMove = (e) => { if (!isDragging) return; updateAngle(e); };
      const handlePointerUp = (e) => { e.target.releasePointerCapture(e.pointerId); setIsDragging(false); };
      
      const updateAngle = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const dx = (e.clientX - rect.left) - cx, dy = cy - (e.clientY - rect.top); 
        let a = (Math.atan2(dy, dx) * 180) / Math.PI;
        if (a < 0) a += 360;
        setAngle(Math.round(a % 180));
      };

      const handleX = cx + 150 * Math.cos((angle * Math.PI) / 180);
      const handleY = cy - 150 * Math.sin((angle * Math.PI) / 180);
      const handleX2 = cx - 150 * Math.cos((angle * Math.PI) / 180);
      const handleY2 = cy + 150 * Math.sin((angle * Math.PI) / 180);

      return (
        <div className="flex flex-col md:flex-row gap-6 items-start">
          <div className="flex-1 w-full flex flex-col gap-4">
            <h2 className="text-2xl font-bold text-[#5c432a] flex items-center gap-2"><Icon paths={icons.GitMerge} className="text-[#6b8e6b]"/>對頂角 (Vertical Angles)</h2>
            <div className="bg-[#f0ece1] rounded-2xl overflow-hidden relative touch-none shadow-inner border-2 border-[#d6cfb8] w-full" style={{ height: '400px' }}>
              <svg ref={svgRef} className="w-full h-full cursor-crosshair" onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
                <path d={generateArcPath(cx, cy, 60, 0, angle)} fill={ghibliColors.red} fillOpacity="0.4" />
                <path d={generateArcPath(cx, cy, 60, angle, 180)} fill={ghibliColors.green} fillOpacity="0.4" />
                <path d={generateArcPath(cx, cy, 60, 180, 180 + angle)} fill={ghibliColors.red} fillOpacity="0.4" />
                <path d={generateArcPath(cx, cy, 60, 180 + angle, 360)} fill={ghibliColors.green} fillOpacity="0.4" />
                {angle > 15 && <text x={cx + 80 * Math.cos((angle/2 * Math.PI) / 180)} y={cy - 80 * Math.sin((angle/2 * Math.PI) / 180)} textAnchor="middle" dominantBaseline="middle" fill="#7a2e2e" fontWeight="bold">∠1</text>}
                {180 - angle > 15 && <text x={cx + 80 * Math.cos(((angle+180)/2 * Math.PI) / 180)} y={cy - 80 * Math.sin(((angle+180)/2 * Math.PI) / 180)} textAnchor="middle" dominantBaseline="middle" fill="#3a523a" fontWeight="bold">∠2</text>}
                {angle > 15 && <text x={cx + 80 * Math.cos(((angle+180*2)/2 * Math.PI) / 180)} y={cy - 80 * Math.sin(((angle+180*2)/2 * Math.PI) / 180)} textAnchor="middle" dominantBaseline="middle" fill="#7a2e2e" fontWeight="bold">∠3</text>}
                {180 - angle > 15 && <text x={cx + 80 * Math.cos(((angle+180*3)/2 * Math.PI) / 180)} y={cy - 80 * Math.sin(((angle+180*3)/2 * Math.PI) / 180)} textAnchor="middle" dominantBaseline="middle" fill="#3a523a" fontWeight="bold">∠4</text>}
                <line x1={cx - 150} y1={cy} x2={cx + 150} y2={cy} stroke={ghibliColors.line} strokeWidth="4" />
                <line x1={handleX2} y1={handleY2} x2={handleX} y2={handleY} stroke={ghibliColors.line} strokeWidth="4" />
                <circle cx={handleX} cy={handleY} r="14" fill="#fffdf7" stroke={ghibliColors.line} strokeWidth="4" className="cursor-grab hover:scale-110 transition-transform" />
                <circle cx={handleX2} cy={handleY2} r="14" fill="#fffdf7" stroke={ghibliColors.line} strokeWidth="4" className="cursor-grab hover:scale-110 transition-transform" />
                <circle cx={cx} cy={cy} r="6" fill={ghibliColors.line} />
              </svg>
            </div>
          </div>
          <div className="md:w-72 bg-[#fffdf7] border-2 border-[#d6cfb8] rounded-2xl p-6 shadow-md flex flex-col gap-4">
            <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Leaf} size={20} className="text-[#6b8e6b]" />角度關係</h3>
            <div className="bg-[#faebeb] p-3 rounded-xl border border-[#e6caca]"><div className="text-sm text-[#a34b4b] font-bold mb-1">對頂角 (玫瑰紅)</div><div className="text-lg font-bold text-[#7a2e2e]">∠1 = ∠3 = {angle}°</div></div>
            <div className="bg-[#ebfaeb] p-3 rounded-xl border border-[#cae6ca]"><div className="text-sm text-[#4b8a4b] font-bold mb-1">對頂角 (森林綠)</div><div className="text-lg font-bold text-[#2e5c2e]">∠2 = ∠4 = {180 - angle}°</div></div>
            <div className="mt-2 pt-4 border-t-2 border-[#e3dec8]"><div className="text-sm text-[#8a7b66] mb-1">平角互補：</div><div className="font-bold text-[#5c432a]">∠1 + ∠2 = 180° <br/>({angle}° + {180 - angle}° = 180°)</div></div>
          </div>
        </div>
      );
    };

    // 3. 多邊形內角和 (分割法)
    const PolygonInteriorSumView = () => {
      const [n, setN] = useState(5);
      const [pts, setPts] = useState([]);
      const [dragIdx, setDragIdx] = useState(null);
      const svgRef = useRef(null);
      const cx = 250, cy = 230, R = 150;

      useEffect(() => {
        let points = [];
        for (let i = 0; i < n; i++) {
          const angle = (i * 360) / n - 90; 
          const rad = (angle * Math.PI) / 180;
          points.push({ x: cx + R * Math.cos(rad), y: cy + R * Math.sin(rad) });
        }
        setPts(points);
      }, [n]);

      const handlePtrDown = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const ex = e.clientX - rect.left, ey = e.clientY - rect.top;
        let closest = -1; let minD = 30;
        pts.forEach((p, i) => { if (getDist(p, {x: ex, y: ey}) < minD) { minD = getDist(p, {x: ex, y: ey}); closest = i; } });
        if (closest !== -1) { e.target.setPointerCapture(e.pointerId); setDragIdx(closest); }
      };

      const handlePtrMove = (e) => {
        if (dragIdx === null || !svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const newPts = [...pts];
        newPts[dragIdx] = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        setPts(newPts);
      };

      const handlePtrUp = (e) => { if (dragIdx !== null) { e.target.releasePointerCapture(e.pointerId); setDragIdx(null); } };

      const triColors = ["#ebfaeb", "#fcf6e8", "#e6f0fa", "#faebeb", "#f3eafa", "#eafaf3"];
      const triStrokes = [ghibliColors.green, ghibliColors.orange, ghibliColors.blue, ghibliColors.red, "#8e6b8e", "#4b8a7b"];
      const trianglesCount = n - 2;

      return (
        <div className="flex flex-col md:flex-row gap-6 items-start">
          <div className="flex-1 w-full flex flex-col gap-4">
            <div className="bg-[#fffdf7] p-4 rounded-xl border-2 border-[#d6cfb8] flex items-center gap-4 shadow-sm shrink-0">
              <span className="font-bold text-[#5c432a] whitespace-nowrap">邊數 (N): {n}</span>
              <input type="range" min="3" max="8" value={n} onChange={(e) => setN(parseInt(e.target.value))} className="w-full accent-[#6b8e6b]"/>
            </div>
            <div className="bg-[#f0ece1] rounded-2xl overflow-hidden relative touch-none shadow-inner border-2 border-[#d6cfb8] w-full" style={{ height: '480px' }}>
              <svg ref={svgRef} className="w-full h-full" onPointerDown={handlePtrDown} onPointerMove={handlePtrMove} onPointerUp={handlePtrUp}>
                {pts.length === n && Array.from({length: trianglesCount}).map((_, idx) => {
                  const i = idx + 1, A = pts[0], B = pts[i], C = pts[i+1];
                  const tColor = triColors[idx % triColors.length], tStroke = triStrokes[idx % triStrokes.length];
                  const centroidX = (A.x + B.x + C.x) / 3, centroidY = (A.y + B.y + C.y) / 3;

                  return (
                    <g key={`split-tri-${idx}`}>
                      <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`} fill={tColor} stroke={tStroke} strokeWidth="3" strokeLinejoin="round" opacity="0.85" />
                      <path d={getInteriorArcWithCenter(A.x, A.y, C, A, B, 35)} fill={tStroke} fillOpacity="0.4" />
                      <path d={getInteriorArcWithCenter(B.x, B.y, A, B, C, 35)} fill={tStroke} fillOpacity="0.4" />
                      <path d={getInteriorArcWithCenter(C.x, C.y, B, C, A, 35)} fill={tStroke} fillOpacity="0.4" />
                      <text x={centroidX} y={centroidY} textAnchor="middle" dominantBaseline="middle" fill={tStroke} fontWeight="bold" fontSize="18">180°</text>
                    </g>
                  )
                })}
                {pts.map((p, i) => (
                  <circle key={`pt-${i}`} cx={p.x} cy={p.y} r="12" fill={i === 0 ? "#ffeb3b" : "#fffdf7"} stroke={ghibliColors.line} strokeWidth="3" className="cursor-grab hover:scale-125 transition-transform" />
                ))}
                <text x={cx} y={cy + 210} textAnchor="middle" fill="#8a7b66" className="text-sm font-medium">黃色圓點是固定的「起點」，拖曳頂點觀察內角變化！</text>
              </svg>
            </div>
          </div>
          <div className="md:w-80 bg-[#fffdf7] border-2 border-[#d6cfb8] rounded-2xl p-6 shadow-md flex flex-col gap-4">
            <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Hexagon} size={20} className="text-[#6b8e6b]" />內角和的奧秘</h3>
            <p className="text-[#5c432a] leading-relaxed mb-1 font-medium">從多邊形的「其中一個頂點」出發，連向其他頂點，我們能把圖形切成好幾個三角形。</p>
            <div className="space-y-3 mt-2">
              <div className="bg-[#e8f1e3] p-3 rounded-xl border border-[#c5dec0] flex justify-between items-center"><span className="text-[#4b6b4b] font-bold">總邊數 (N)</span><span className="text-xl font-bold text-[#2e5c2e]">{n}</span></div>
              <div className="bg-[#e6f0fa] p-3 rounded-xl border border-[#b3d4f0] flex justify-between items-center"><span className="text-[#3b5e80] font-bold">分割出幾塊三角形？</span><span className="text-xl font-bold text-[#204060]">{trianglesCount}</span></div>
            </div>
            <div className="mt-auto pt-4 border-t-2 border-[#e3dec8]">
              <div className="text-sm text-[#8a7b66] mb-2">多邊形內角和公式推導：</div>
              <div className="bg-[#f0ece1] p-4 rounded-xl border border-[#d6cfb8] text-center">
                <div className="text-lg font-bold text-[#5c432a] mb-1">三角形數量 × 180°</div>
                <div className="text-2xl font-black text-[#d98a59]">({n} - 2) × 180° = {trianglesCount * 180}°</div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // 4. 多邊形外角和
    const PolygonsView = () => {
      const [n, setN] = useState(5);
      const [mode, setMode] = useState('regular'); 
      const [pts, setPts] = useState([{x: 200, y: 100}, {x: 100, y: 300}, {x: 300, y: 300}]);
      const [arbPts, setArbPts] = useState([{x: 160, y: 80}, {x: 80, y: 220}, {x: 180, y: 320}, {x: 340, y: 260}, {x: 300, y: 100}]);
      
      const [progress, setProgress] = useState(0);
      const [isAnimating, setIsAnimating] = useState(false);
      const [dragIdx, setDragIdx] = useState(null);
      const svgRef = useRef(null);
      const cx = 200, cy = 200, R = 120;

      useEffect(() => {
        if (!isAnimating) return;
        let frameId;
        let startTime = null;
        const duration = 2500; 
        const animate = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const elapsed = timestamp - startTime;
          let p = elapsed / duration;
          const easeOut = 1 - Math.pow(1 - p, 3);
          if (p >= 1) { setProgress(1); setIsAnimating(false); } 
          else { setProgress(easeOut); frameId = requestAnimationFrame(animate); }
        };
        frameId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(frameId);
      }, [isAnimating]);

      const switchMode = (newMode) => { setMode(newMode); setProgress(0); setIsAnimating(false); };

      const polyPoints = useMemo(() => {
        let points = [];
        for (let i = 0; i < n; i++) {
          const angle = (i * 360) / n - 90; 
          const rad = (angle * Math.PI) / 180;
          points.push({ x: cx + R * Math.cos(rad), y: cy + R * Math.sin(rad) });
        }
        return points;
      }, [n]);

      const handlePtrDown = (e) => {
        if (!svgRef.current || isAnimating || progress > 0) return;
        const rect = svgRef.current.getBoundingClientRect();
        const ex = e.clientX - rect.left, ey = e.clientY - rect.top;
        const checkDrag = (pointsSet) => {
          let closest = -1; let minD = 30;
          pointsSet.forEach((p, i) => { if (getDist(p, {x: ex, y: ey}) < minD) { minD = getDist(p, {x: ex, y: ey}); closest = i; } });
          if (closest !== -1) { e.target.setPointerCapture(e.pointerId); setDragIdx(closest); }
        };
        if (mode === 'triangle') checkDrag(pts);
        else if (mode === 'arbitrary') checkDrag(arbPts);
      };

      const handlePtrMove = (e) => {
        if (dragIdx === null || !svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const nx = e.clientX - rect.left, ny = e.clientY - rect.top;
        if (mode === 'triangle') { const newPts = [...pts]; newPts[dragIdx] = { x: nx, y: ny }; setPts(newPts); } 
        else if (mode === 'arbitrary') { const newPts = [...arbPts]; newPts[dragIdx] = { x: nx, y: ny }; setArbPts(newPts); }
      };

      const handlePtrUp = (e) => { if (dragIdx !== null) { e.target.releasePointerCapture(e.pointerId); setDragIdx(null); } };

      const triAngles = useMemo(() => {
        if (mode !== 'triangle') return [0,0,0];
        const [A, B, C] = pts;
        let angA = Math.acos((getDist(A,C)**2 + getDist(A,B)**2 - getDist(B,C)**2) / (2*getDist(A,C)*getDist(A,B))) * 180 / Math.PI;
        let angB = Math.acos((getDist(B,C)**2 + getDist(A,B)**2 - getDist(A,C)**2) / (2*getDist(B,C)*getDist(A,B))) * 180 / Math.PI;
        return [Math.round(angA), Math.round(angB), Math.round(180 - angA - angB)];
      }, [pts, mode]);

      const centroidX = arbPts.reduce((sum, p) => sum + p.x, 0) / arbPts.length;
      const centroidY = arbPts.reduce((sum, p) => sum + p.y, 0) / arbPts.length;

      return (
        <div className="flex flex-col md:flex-row gap-6 items-start">
          <div className="flex-1 w-full flex flex-col gap-4">
            <div className="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
              <button onClick={() => switchMode('regular')} className={`whitespace-nowrap px-4 py-2 rounded-xl font-bold transition-all border-b-4 ${mode === 'regular' ? 'bg-[#6b8e6b] text-white border-[#4b6b4b] translate-y-1 border-b-0' : 'bg-[#e3dec8] text-[#5c432a] border-[#c4ba9f] hover:bg-[#d8cfb3]'}`}>正多邊形外角和</button>
              <button onClick={() => switchMode('arbitrary')} className={`whitespace-nowrap px-4 py-2 rounded-xl font-bold transition-all border-b-4 ${mode === 'arbitrary' ? 'bg-[#d98a59] text-white border-[#b0612d] translate-y-1 border-b-0' : 'bg-[#e3dec8] text-[#5c432a] border-[#c4ba9f] hover:bg-[#d8cfb3]'}`}>任意多邊形外角和</button>
              <button onClick={() => switchMode('triangle')} className={`whitespace-nowrap px-4 py-2 rounded-xl font-bold transition-all border-b-4 ${mode === 'triangle' ? 'bg-[#5a82a0] text-white border-[#42627a] translate-y-1 border-b-0' : 'bg-[#e3dec8] text-[#5c432a] border-[#c4ba9f] hover:bg-[#d8cfb3]'}`}>任意三角形</button>
            </div>

            {mode === 'regular' && (
              <div className="bg-[#fffdf7] p-4 rounded-xl border-2 border-[#d6cfb8] flex items-center gap-4 shadow-sm shrink-0">
                <span className="font-bold text-[#5c432a] whitespace-nowrap">邊數 (N): {n}</span>
                <input type="range" min="3" max="10" value={n} onChange={(e) => setN(parseInt(e.target.value))} disabled={isAnimating || progress > 0} className="w-full accent-[#6b8e6b] disabled:opacity-50"/>
              </div>
            )}

            <div className="bg-[#f0ece1] rounded-2xl overflow-hidden relative touch-none shadow-inner border-2 border-[#d6cfb8] w-full" style={{ height: '450px' }}>
              <svg ref={svgRef} className="w-full h-full" onPointerDown={handlePtrDown} onPointerMove={handlePtrMove} onPointerUp={handlePtrUp}>
                
                {mode === 'regular' && (
                  <>
                    <polygon points={polyPoints.map(p => `${p.x * (1 - progress) + cx * progress},${p.y * (1 - progress) + cy * progress}`).join(' ')} fill="#e8f1e3" stroke={ghibliColors.green} strokeWidth="3" strokeLinejoin="round" opacity={1 - progress} />
                    {polyPoints.map((p, i) => {
                      const prevP = polyPoints[(i - 1 + n) % n], nextP = polyPoints[(i + 1) % n];
                      const drawnX = p.x * (1 - progress) + cx * progress, drawnY = p.y * (1 - progress) + cy * progress;
                      const a1 = Math.atan2(-(p.y - prevP.y), p.x - prevP.x) * 180 / Math.PI;
                      return (
                        <g key={`reg-${i}`}>
                          <path d={getInteriorArcWithCenter(drawnX, drawnY, prevP, p, nextP, 30)} fill={ghibliColors.green} fillOpacity={Math.max(0, (1 - progress) * 0.4)} />
                          <path d={getExteriorArcWithCenter(drawnX, drawnY, prevP, p, nextP, 40)} fill={ghibliColors.orange} fillOpacity="0.8" />
                          <line x1={drawnX} y1={drawnY} x2={drawnX + Math.cos(-a1 * Math.PI / 180) * 60} y2={drawnY + Math.sin(-a1 * Math.PI / 180) * 60} stroke={ghibliColors.orange} strokeWidth="3" strokeDasharray="5 5" opacity={1 - (progress * 0.8)} />
                          {i === 0 && progress === 0 && <text x={drawnX - 10} y={drawnY + 45} fill="#3a523a" fontSize="14" fontWeight="bold">內角</text>}
                          {i === 0 && progress === 0 && <text x={drawnX + Math.cos(-a1 * Math.PI / 180) * 35} y={drawnY + Math.sin(-a1 * Math.PI / 180) * 35} fill="#b0612d" fontSize="14" fontWeight="bold" textAnchor="middle" dominantBaseline="middle">外角</text>}
                        </g>
                      );
                    })}
                    {progress >= 1 && (
                      <g className="animate-in">
                        <circle cx={cx} cy={cy} r="46" fill="none" stroke="#5c432a" strokeWidth="4" strokeDasharray="6 6" className="animate-spin-slow" />
                        <rect x={cx - 70} y={cy + 70} width="140" height="36" rx="10" fill="#fffdf7" stroke="#5c432a" strokeWidth="2" />
                        <text x={cx} y={cy + 94} textAnchor="middle" fill="#5c432a" fontSize="18" fontWeight="bold">外角和 = 360°</text>
                      </g>
                    )}
                  </>
                )}

                {mode === 'arbitrary' && (
                  <>
                    <polygon points={arbPts.map(p => `${p.x * (1 - progress) + centroidX * progress},${p.y * (1 - progress) + centroidY * progress}`).join(' ')} fill="#fcf6e8" stroke={ghibliColors.line} strokeWidth="3" strokeLinejoin="round" opacity={1 - progress} />
                    {arbPts.map((p, i) => {
                      const nArb = arbPts.length, prevP = arbPts[(i - 1 + nArb) % nArb], nextP = arbPts[(i + 1) % nArb];
                      const a1 = Math.atan2(-(p.y - prevP.y), p.x - prevP.x) * 180 / Math.PI;
                      const drawnX = p.x * (1 - progress) + centroidX * progress, drawnY = p.y * (1 - progress) + centroidY * progress;
                      const colors = [ghibliColors.orange, ghibliColors.red, ghibliColors.blue, ghibliColors.green, "#e5b567"];
                      return (
                        <g key={`arb-${i}`}>
                          <path d={getInteriorArcWithCenter(drawnX, drawnY, prevP, p, nextP, 30)} fill={colors[i]} fillOpacity={Math.max(0, (1 - progress) * 0.2)} />
                          <path d={getExteriorArcWithCenter(drawnX, drawnY, prevP, p, nextP, 50)} fill={colors[i]} fillOpacity="0.8" />
                          <line x1={drawnX} y1={drawnY} x2={drawnX + Math.cos(-a1 * Math.PI / 180) * 80} y2={drawnY + Math.sin(-a1 * Math.PI / 180) * 80} stroke={colors[i]} strokeWidth="4" strokeLinecap="round" opacity={1 - (progress * 0.8)} />
                          {progress === 0 && <circle cx={p.x} cy={p.y} r="14" fill="#fffdf7" stroke={ghibliColors.line} strokeWidth="4" className="cursor-grab hover:scale-110 transition-transform" />}
                        </g>
                      );
                    })}
                    {progress >= 1 && (
                      <g className="animate-in">
                        <circle cx={centroidX} cy={centroidY} r="54" fill="none" stroke="#5c432a" strokeWidth="4" strokeDasharray="6 6" className="animate-spin-slow" />
                        <rect x={centroidX - 70} y={centroidY + 70} width="140" height="36" rx="10" fill="#fffdf7" stroke="#5c432a" strokeWidth="2" />
                        <text x={centroidX} y={centroidY + 94} textAnchor="middle" fill="#5c432a" fontSize="18" fontWeight="bold">外角和 = 360°</text>
                      </g>
                    )}
                    {progress === 0 && <text x={cx} y={cy + 180} textAnchor="middle" fill="#8a7b66" className="text-sm font-medium">拖曳頂點改變形狀，點擊右方播放動畫！</text>}
                  </>
                )}

                {mode === 'triangle' && (
                  <>
                    <polygon points={pts.map(p => `${p.x},${p.y}`).join(' ')} fill="#fcf6e8" stroke={ghibliColors.orange} strokeWidth="3" strokeLinejoin="round"/>
                    {pts.map((p, i) => {
                      const prevP = pts[(i - 1 + 3) % 3], nextP = pts[(i + 1) % 3];
                      const a1 = Math.atan2(-(p.y - prevP.y), p.x - prevP.x) * 180 / Math.PI;
                      const tx = (p.x * 2.5 + ((pts[0].x + pts[1].x + pts[2].x)/3)) / 3.5, ty = (p.y * 2.5 + ((pts[0].y + pts[1].y + pts[2].y)/3)) / 3.5;
                      return (
                        <g key={`tri-${i}`}>
                          <path d={getInteriorArcWithCenter(p.x, p.y, prevP, p, nextP, 35)} fill={ghibliColors.orange} fillOpacity="0.4" />
                          <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle" fill="#9e5b30" fontWeight="bold" fontSize="16">{triAngles[i]}°</text>
                          <path d={getExteriorArcWithCenter(p.x, p.y, prevP, p, nextP, 35)} fill={ghibliColors.red} fillOpacity="0.5" />
                          <line x1={p.x} y1={p.y} x2={p.x + Math.cos(-a1 * Math.PI / 180) * 70} y2={p.y + Math.sin(-a1 * Math.PI / 180) * 70} stroke={ghibliColors.red} strokeWidth="3" strokeDasharray="5 5" />
                          <text x={p.x + Math.cos(-a1 * Math.PI / 180) * 45} y={p.y + Math.sin(-a1 * Math.PI / 180) * 45} fill="#7a2e2e" fontSize="14" fontWeight="bold" textAnchor="middle" dominantBaseline="middle">外角</text>
                          <circle cx={p.x} cy={p.y} r="14" fill="#fffdf7" stroke={ghibliColors.line} strokeWidth="4" className="cursor-grab hover:scale-110 transition-transform" />
                        </g>
                      );
                    })}
                  </>
                )}

              </svg>
            </div>
          </div>

          <div className="md:w-80 bg-[#fffdf7] border-2 border-[#d6cfb8] rounded-2xl p-6 shadow-md flex flex-col gap-4">
            {mode === 'regular' && (
              <>
                <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Leaf} size={20} className="text-[#6b8e6b]" />正 {n} 邊形計算</h3>
                <div className="space-y-3">
                  <div className="bg-[#fcf6e8] p-3 rounded-xl border border-[#ebdcb3]"><div className="text-sm text-[#9e5b30] font-bold mb-1">外角和</div><div className="text-lg font-bold text-[#d98a59]">恆為 360°</div></div>
                  <div className="bg-[#e8f1e3] p-3 rounded-xl border border-[#c5dec0]"><div className="text-sm text-[#4b6b4b] font-bold mb-1">單一外角</div><div className="text-lg font-bold text-[#2e5c2e]">360° ÷ {n} = {+(360/n).toFixed(1)}°</div></div>
                </div>
                <div className="mt-auto pt-4 border-t-2 border-[#e3dec8]">
                  {progress < 1 && !isAnimating ? <button onClick={() => {setProgress(0); setIsAnimating(true);}} className="w-full flex items-center justify-center gap-2 bg-[#6b8e6b] text-white py-3 rounded-xl font-bold text-lg hover:bg-[#4b6b4b] transition-all shadow-sm border-b-4 border-[#4b6b4b] active:border-b-0 active:translate-y-1"><Icon paths={icons.Play} size={20} /> 縮小動畫</button>
                  : <button onClick={() => {setProgress(0); setIsAnimating(false);}} className="w-full flex items-center justify-center gap-2 bg-[#5a82a0] text-white py-3 rounded-xl font-bold text-lg hover:bg-[#42627a] transition-all shadow-sm border-b-4 border-[#42627a] active:border-b-0 active:translate-y-1"><Icon paths={icons.RotateCcw} size={20} /> 還原形狀</button>}
                </div>
              </>
            )}
            
            {mode === 'arbitrary' && (
              <>
                <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Leaf} size={20} className="text-[#d98a59]" />外角和的奧秘</h3>
                <p className="text-[#5c432a] leading-relaxed mb-2 font-medium">這個動畫展示了數學中最優美的一個概念：無論多邊形的形狀怎麼改變，所有的外角拼湊起來，永遠會是一個完整的圓（360°）！</p>
                <div className="mt-auto pt-4 border-t-2 border-[#e3dec8]">
                  {progress < 1 && !isAnimating ? <button onClick={() => {setProgress(0); setIsAnimating(true);}} className="w-full flex items-center justify-center gap-2 bg-[#d98a59] text-white py-3 rounded-xl font-bold text-lg hover:bg-[#b0612d] transition-all shadow-sm border-b-4 border-[#b0612d] active:border-b-0 active:translate-y-1"><Icon paths={icons.Play} size={20} /> 播放動畫</button>
                  : <button onClick={() => {setProgress(0); setIsAnimating(false);}} className="w-full flex items-center justify-center gap-2 bg-[#5a82a0] text-white py-3 rounded-xl font-bold text-lg hover:bg-[#42627a] transition-all shadow-sm border-b-4 border-[#42627a] active:border-b-0 active:translate-y-1"><Icon paths={icons.RotateCcw} size={20} /> 重新探索</button>}
                </div>
              </>
            )}

            {mode === 'triangle' && (
              <>
                <h3 className="text-xl font-bold text-[#5c432a] border-b-2 border-[#e3dec8] pb-2 flex items-center gap-2"><Icon paths={icons.Leaf} size={20} className="text-[#6b8e6b]" />三角形外角</h3>
                <div className="space-y-3">
                  <div className="flex justify-between items-center bg-[#faebeb] p-3 rounded-xl border border-[#e6caca]"><span className="font-bold text-[#a34b4b]">∠A 外角</span><span className="font-bold text-[#7a2e2e]">{180 - triAngles[0]}°</span></div>
                  <div className="flex justify-between items-center bg-[#faebeb] p-3 rounded-xl border border-[#e6caca]"><span className="font-bold text-[#a34b4b]">∠B 外角</span><span className="font-bold text-[#7a2e2e]">{180 - triAngles[1]}°</span></div>
                  <div className="flex justify-between items-center bg-[#faebeb] p-3 rounded-xl border border-[#e6caca]"><span className="font-bold text-[#a34b4b]">∠C 外角</span><span className="font-bold text-[#7a2e2e]">{180 - triAngles[2]}°</span></div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    // 5. 角度小測驗
    const QuizView = () => {
      const [hp, setHp] = useState(0); 
      const maxHp = 240; 
      const [questions, setQuestions] = useState([]);
      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [selectedOpt, setSelectedOpt] = useState(null);
      const [message, setMessage] = useState("");
      const [quizFinished, setQuizFinished] = useState(false);

      const generateQuestionsSet = () => {
        const qList = [];
        const createQ = (type) => {
          let baseAngle, correct, text, explanation;
          if (type === 'comp') {
            baseAngle = Math.floor(Math.random() * 70) + 10; 
            correct = 90 - baseAngle;
            text = `已知 ∠A = ${baseAngle}°，請問 ∠A 的「餘角」是多少度？`;
            explanation = `因為互餘兩角相加為 90°，所以 90° - ${baseAngle}° = ${correct}°。`;
          } else if (type === 'supp') {
            baseAngle = Math.floor(Math.random() * 150) + 15; 
            correct = 180 - baseAngle;
            text = `已知 ∠B = ${baseAngle}°，請問 ∠B 的「補角」是多少度？`;
            explanation = `因為互補兩角相加為 180°，所以 180° - ${baseAngle}° = ${correct}°。`;
          } else if (type === 'vertical') {
            baseAngle = Math.floor(Math.random() * 150) + 15; 
            correct = baseAngle;
            text = `兩直線相交，已知其中一個角為 ${baseAngle}°，請問它的「對頂角」是多少度？`;
            explanation = `對頂角的度數是相等的，所以也是 ${correct}°。`;
          } else if (type === 'tri') {
            const a = Math.floor(Math.random() * 60) + 30;
            const b = Math.floor(Math.random() * 60) + 30;
            correct = 180 - a - b;
            text = `一個三角形中，已知 ∠A = ${a}°，∠B = ${b}°，請問 ∠C 是多少度？`;
            explanation = `三角形內角和是 180°，所以 180° - ${a}° - ${b}° = ${correct}°。`;
          } else if (type === 'poly') {
            const n = Math.floor(Math.random() * 5) + 4; 
            if (Math.random() > 0.5) {
              correct = (n-2) * 180;
              text = `請問正 ${n} 邊形的「內角和」是多少度？`;
              explanation = `多邊形內角和公式為 (N - 2) × 180°，所以 (${n} - 2) × 180° = ${correct}°。`;
            } else {
              correct = 360 / n;
              text = `請問正 ${n} 邊形的「單一外角」是多少度？`;
              explanation = `任意正多邊形的外角和都是 360°，單一外角為 360° ÷ ${n} = ${correct}°。`;
            }
          }
          let optSet = new Set([correct]);
          if(typeof baseAngle !== 'undefined') { optSet.add(Math.abs(180 - baseAngle)); if (baseAngle < 90) optSet.add(90 - baseAngle); optSet.add(baseAngle); }
          while (optSet.size < 4) {
            let wrong = correct + (Math.floor(Math.random() * 4) + 1) * 10 * (Math.random()>0.5?1:-1);
            if (wrong <= 0 || optSet.has(wrong)) wrong = correct + Math.floor(Math.random() * 20) + 5;
            optSet.add(wrong);
          }
          return { type, correct, text, options: Array.from(optSet).sort(() => Math.random() - 0.5), explanation };
        };

        for(let i=0; i<3; i++) qList.push({...createQ('comp'), stageName: '第一階段：餘角試煉'});
        for(let i=0; i<3; i++) qList.push({...createQ('supp'), stageName: '第二階段：補角試煉'});
        for(let i=0; i<3; i++) qList.push({...createQ('vertical'), stageName: '第三階段：對頂角試煉'});
        const mixTypes = ['comp', 'supp', 'vertical', 'tri', 'poly'];
        for(let i=0; i<15; i++) qList.push({...createQ(mixTypes[Math.floor(Math.random() * mixTypes.length)]), stageName: '第四階段：綜合最終試煉'});
        return qList;
      };

      const startQuiz = () => { setQuestions(generateQuestionsSet()); setCurrentQIndex(0); setHp(0); setSelectedOpt(null); setQuizFinished(false); };
      useEffect(() => { startQuiz(); }, []);

      const handleSelect = (opt) => {
        if (selectedOpt !== null) return; 
        setSelectedOpt(opt);
        if (opt === questions[currentQIndex].correct) { setHp(prev => Math.min(maxHp, prev + 10)); setMessage("答對了！為森林注入了一股生機！ (+10 HP)"); } 
        else setMessage("哎呀，答錯了！ (未能補血)");
      };

      const nextQuestion = () => {
        if (currentQIndex + 1 < questions.length) { setCurrentQIndex(c => c + 1); setSelectedOpt(null); setMessage(""); } 
        else setQuizFinished(true);
      };

      if (questions.length === 0) return null;

      if (quizFinished) {
        return (
          <div className="max-w-2xl mx-auto bg-[#fffdf7] p-10 rounded-3xl shadow-xl border-4 border-[#d6cfb8] text-center mt-10">
            <Icon paths={icons.TreePine} size={80} className="mx-auto text-[#6b8e6b] mb-6" />
            <h2 className="text-3xl font-bold text-[#5c432a] mb-4">闖關結束！</h2>
            <p className="text-xl text-[#8a7b66] mb-8 font-medium">你總共為枯萎的森林恢復了 <span className="text-3xl font-bold text-[#6b8e6b]">{hp}</span> 點生命力！</p>
            <button onClick={startQuiz} className="bg-[#d98a59] text-white px-10 py-4 rounded-xl font-bold text-xl hover:bg-[#b0612d] transition-all shadow-md border-b-4 border-[#b0612d] active:border-b-0 active:translate-y-1">再次挑戰森林</button>
          </div>
        );
      }

      const currentQ = questions[currentQIndex];
      const isAnswered = selectedOpt !== null;
      const hpPercent = (hp / maxHp) * 100;
      const hpColor = hpPercent > 60 ? "bg-[#6b8e6b]" : hpPercent > 30 ? "bg-[#d98a59]" : "bg-[#c16565]";

      return (
        <div className="max-w-3xl mx-auto flex flex-col gap-6 relative">
          <div className="bg-[#fffdf7] p-5 rounded-2xl border-2 border-[#d6cfb8] shadow-md flex flex-col gap-3">
            <div className="flex justify-between items-center">
              <h2 className="text-xl font-bold text-[#5c432a] flex items-center gap-2"><Icon paths={icons.Heart} className={`${hpPercent > 30 ? 'text-[#c16565]' : 'text-slate-400'}`} fill={hpPercent > 0 ? "currentColor" : "none"} />森林生命力 (HP)</h2>
              <div className="font-bold text-[#5c432a] bg-[#f0ece1] px-4 py-1.5 rounded-full text-sm border border-[#d6cfb8]">進度：第 {currentQIndex + 1} / {questions.length} 題</div>
            </div>
            <div className="w-full h-8 bg-[#3e362e] rounded-full border-4 border-[#5c432a] overflow-hidden relative shadow-inner">
              <div className={`h-full transition-all duration-700 ease-out ${hpColor}`} style={{ width: `${hpPercent}%` }} />
              <div className="absolute top-0 left-0 right-0 h-1/3 bg-white opacity-20 rounded-t-full"></div>
            </div>
            <div className="flex justify-between text-sm font-bold text-[#8a7b66]"><span className="flex items-center gap-1"><Icon paths={icons.Map} size={16}/> {currentQ.stageName}</span><span>{hp} / {maxHp}</span></div>
          </div>
          <div className="bg-[#fffdf7] p-8 rounded-2xl shadow-md border-2 border-[#d6cfb8] relative overflow-hidden min-h-[350px]">
            <div className="absolute -right-6 -bottom-6 opacity-10 pointer-events-none"><Icon paths={icons.Leaf} size={150} /></div>
            <div className="text-2xl font-bold text-[#5c432a] mb-8 leading-relaxed relative z-10">{currentQ.text}</div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
              {currentQ.options.map((opt, i) => {
                let btnClass = "py-4 px-6 rounded-xl text-xl font-bold transition-all border-b-4 ";
                if (!isAnswered) btnClass += "bg-[#8c6b4a] border-[#5c432a] text-[#fffdf7] hover:bg-[#9e7b57] hover:-translate-y-1 active:translate-y-1 active:border-b-0";
                else if (opt === currentQ.correct) btnClass += "bg-[#6b8e6b] border-[#4b6b4b] text-white"; 
                else if (opt === selectedOpt) btnClass += "bg-[#c16565] border-[#914646] text-white"; 
                else btnClass += "bg-[#e3dec8] border-[#c4ba9f] text-[#8a7b66] opacity-60"; 
                return <button key={i} onClick={() => handleSelect(opt)} disabled={isAnswered} className={btnClass} style={{ transform: (isAnswered && opt !== currentQ.correct && opt !== selectedOpt) ? 'translateY(4px)' : '', borderBottomWidth: (isAnswered && opt !== currentQ.correct && opt !== selectedOpt) ? '0px' : '' }}>{opt}°</button>;
              })}
            </div>
            {isAnswered && (
              <div className="mt-8 relative z-10 animate-in">
                <div className={`p-6 rounded-xl border-2 flex flex-col items-center gap-4 ${selectedOpt === currentQ.correct ? 'bg-[#ebfaeb] border-[#cae6ca]' : 'bg-[#faebeb] border-[#e6caca]'}`}>
                  <div className="flex items-center gap-3 text-2xl font-bold">
                    {selectedOpt === currentQ.correct ? <><Icon paths={icons.CheckCircle2} className="text-[#4b8a4b] w-8 h-8" /> <span className="text-[#2e5c2e]">{message}</span></> : <><Icon paths={icons.XCircle} className="text-[#a34b4b] w-8 h-8" /> <span className="text-[#7a2e2e]">{message}</span></>}
                  </div>
                  <div className="text-lg text-[#5c432a] font-medium bg-[#fffdf7] p-4 rounded-xl border-2 border-[#d6cfb8] w-full text-center shadow-sm">{currentQ.explanation}</div>
                  <button onClick={nextQuestion} className="mt-2 flex items-center gap-2 bg-[#5a82a0] text-white px-8 py-3 rounded-xl font-bold text-lg hover:bg-[#42627a] transition-colors shadow-md border-b-4 border-[#42627a] active:border-b-0 active:translate-y-1">{currentQIndex + 1 === questions.length ? "查看結果" : "前往下一題"} <Icon paths={icons.ArrowRight} size={20} /></button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- Main App ---
    const GeometryApp = () => {
      const [activeTab, setActiveTab] = useState('comp-supp');

      const navItems = [
        { id: 'comp-supp', label: '互餘與互補角', icon: icons.Circle },
        { id: 'vertical', label: '對頂角', icon: icons.GitMerge },
        { id: 'interior-sum', label: '多邊形內角和', icon: icons.Hexagon },
        { id: 'exterior-sum', label: '多邊形外角和', icon: icons.Triangle },
        { id: 'quiz', label: '森林測驗', icon: icons.ClipboardList },
      ];

      return (
        <div className="min-h-screen bg-[#e8f1e3] text-[#3e362e] font-sans pb-10 tracking-wide">
          <header className="bg-[#4b7051] text-[#fffdf7] p-5 shadow-lg border-b-4 border-[#3a5a40] flex justify-center items-center gap-3 relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle, #fff 10%, transparent 20%)', backgroundSize: '20px 20px' }}></div>
            <div className="bg-[#fffdf7] text-[#4b7051] p-2 rounded-xl shadow-sm relative z-10"><Icon paths={icons.Leaf} size={28} /></div>
            <h1 className="text-3xl font-bold tracking-widest relative z-10" style={{ textShadow: '2px 2px 0px #3a5a40' }}>幾何之森：角度探索</h1>
          </header>

          <main className="max-w-6xl mx-auto px-4 mt-8 flex flex-col lg:flex-row gap-8">
            <div className="lg:w-60 flex lg:flex-col gap-3 overflow-x-auto pb-2 lg:pb-0 hide-scrollbar">
              {navItems.map(item => (
                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex items-center gap-3 px-5 py-4 rounded-2xl font-bold transition-all whitespace-nowrap lg:whitespace-normal border-2 ${activeTab === item.id ? 'bg-[#8c6b4a] text-[#fffdf7] border-[#5c432a] shadow-md transform scale-[1.02]' : 'bg-[#fffdf7] text-[#8a7b66] border-[#d6cfb8] hover:bg-[#f0ece1] hover:text-[#5c432a] hover:border-[#bdae93]'}`}>
                  <div className={`${activeTab === item.id ? 'text-[#fffdf7]' : 'text-[#6b8e6b]'}`}><Icon paths={item.icon} size={20} /></div>{item.label}
                </button>
              ))}
            </div>
            <div className="flex-1 bg-[#fdfbf7] p-6 lg:p-8 rounded-3xl shadow-xl border-4 border-[#d6cfb8]">
              {activeTab === 'comp-supp' && <CompSuppView />}
              {activeTab === 'vertical' && <VerticalAnglesView />}
              {activeTab === 'interior-sum' && <PolygonInteriorSumView />}
              {activeTab === 'exterior-sum' && <PolygonsView />}
              {activeTab === 'quiz' && <QuizView />}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GeometryApp />);
  </script>
</body>
</html>
